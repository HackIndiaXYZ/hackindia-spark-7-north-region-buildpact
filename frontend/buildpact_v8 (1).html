  <style>

    /* ─────────────────────────────────────────────────────────────
       BASE RESET — honour Tailwind's box-sizing assumptions
    ───────────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─────────────────────────────────────────────────────────────
       @keyframes pulse
       Smooth opacity breathe — used for loading indicators
    ───────────────────────────────────────────────────────────── */
    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* ─────────────────────────────────────────────────────────────
       @keyframes spin
       Full 360° rotation — used for spinners / loaders
    ───────────────────────────────────────────────────────────── */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ─────────────────────────────────────────────────────────────
       @keyframes fadeIn
       Opacity + subtle vertical rise — general element entrance
    ───────────────────────────────────────────────────────────── */
    @keyframes fadeIn {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ─────────────────────────────────────────────────────────────
       @keyframes slideUp
       Larger vertical rise — cards, modals, panels
    ───────────────────────────────────────────────────────────── */
    @keyframes slideUp {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ─────────────────────────────────────────────────────────────
       @keyframes slideRight
       Horizontal entrance from the left — sidebars, drawers
    ───────────────────────────────────────────────────────────── */
    @keyframes slideRight {
      0%   { opacity: 0; transform: translateX(-20px); }
      100% { opacity: 1; transform: translateX(0); }
    }

       @keyframes confetti
       Multiple small coloured squares falling from top
       Uses pseudo-random transforms to scatter realistically
    ───────────────────────────────────────────────────────────── */
    @keyframes confetti {
      0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }
      80% {

      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }

    /* ─────────────────────────────────────────────────────────────
       @keyframes progressFill

    ───────────────────────────────────────────────────────────── */
    @keyframes progressFill {
      0%   { width: 0%; }
      100% { width: 100%; }

       @keyframes countUp
       Clip-path trick to reveal a number rolling upward

    ───────────────────────────────────────────────────────────── */

      0%   { transform: translateY(100%); opacity: 0; }
      20%  { opacity: 1; }
      100% { transform: translateY(0%);   opacity: 1; }
    }

       @keyframes greenFlash
       Background pulses green briefly — success confirmation
    ───────────────────────────────────────────────────────────── */
    @keyframes greenFlash {
      0%   { background-color: transparent; }
      20%  { background-color: rgba(34, 197, 94, 0.25); }
      60%  { background-color: rgba(34, 197, 94, 0.15); }
      100% { background-color: transparent; }
    }

       @keyframes matrixRain
       Subtle vertical fall at very low opacity — decorative bg
       Intended for a pseudo-element overlay on hero sections
    ───────────────────────────────────────────────────────────── */
    @keyframes matrixRain {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }
      10% {
        opacity: 0.06;
      }
      90% {
        opacity: 0.06;
      }
      100% {
        transform: translateY(100vh);

       UTILITY ANIMATION CLASSES
    ───────────────────────────────────────────────────────────── */

   const firebaseConfig = {

  storageBucket: "buildpact-dev-b5d8d.firebasestorage.app",
  messagingSenderId: "671989882310",
  appId: "1:671989882310:web:257af62377bdea585be6c7",
  measurementId: "G-MGKFZJLSQS"
};

    // ─────────────────────────────────────────────────────────────
    // INITIALISE FIREBASE SERVICES
    // ─────────────────────────────────────────────────────────────
    const app            = initializeApp(firebaseConfig);
    const auth           = getAuth(app);
    const db             = getFirestore(app);
    const storage        = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    // ─────────────────────────────────────────────────────────────
    // EXPOSE TO WINDOW — non-module Babel script reads these
    // ─────────────────────────────────────────────────────────────
    window.firebaseApp     = app;
    window.firebaseAuth    = auth;
    window.firebaseDb      = db;
    window.firebaseStorage = storage;
    window.googleProvider  = googleProvider;

    // Bundle all Firestore / Auth / Storage functions into one object
    // so components can do: const { doc, setDoc } = window.firebaseFns;
    window.firebaseFns = {
      // Auth
      signInWithPopup,
      signOut,
      onAuthStateChanged,
      // Firestore
      doc,
      getDoc,
      setDoc,
      updateDoc,
      addDoc,
      collection,
      query,
      where,
      orderBy,
      onSnapshot,
      serverTimestamp,
      arrayUnion,
      // Storage
      ref,
      uploadString,
      getDownloadURL
    };

    // Signal that Firebase is fully wired up
    window.firebaseReady = true;
    window.dispatchEvent(new Event('firebase-ready'));

            ...(contract.db_collections || []).map(c => c.toLowerCase()),

        if (!projectId || !window.firebaseFns || !window.firebaseDb) {
          setLoading(false);
          return;
        }

        const { doc, onSnapshot } = window.firebaseFns;
        setLoading(true);
        setError(null);

        const ref = doc(window.firebaseDb, 'projects', projectId);
        const unsub = onSnapshot(
          ref,
          (snap) => {
            if (snap.exists()) {
              setProject({ id: snap.id, ...snap.data() });
            } else {
              setProject(null);
            }
            setLoading(false);
          },
          (err) => {
            console.error('[useProjectListener] Firestore error:', err);
            setError(err.message || 'Failed to load project');
            setLoading(false);
          }
        );

        // Cleanup: unsubscribe on unmount or when projectId changes
        return () => unsub();
      }, [projectId]);

      return { project, loading, error };
    }

    // ─────────────────────────────────────────────────────────────
    // useTestResultsListener
    // Subscribes to the testResults/{projectId}/results subcollection
    // ordered by timestamp descending.
    // Returns: { results, loading, error, stats }
    //   stats: { total, passed, failed, flaky }
    // ─────────────────────────────────────────────────────────────
    function useTestResultsListener(projectId) {
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState(null);
      const [stats,   setStats]   = useState({ total: 0, passed: 0, failed: 0, flaky: 0 });

      useEffect(() => {
        if (!projectId || !window.firebaseFns || !window.firebaseDb) {
          setLoading(false);
          return;
        }

        const { collection, query, orderBy, onSnapshot } = window.firebaseFns;
        setLoading(true);

        const colRef = collection(window.firebaseDb, 'testResults', projectId, 'results');
        const q      = query(colRef, orderBy('timestamp', 'desc'));

        const unsub = onSnapshot(
          q,
          (snap) => {
            const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setResults(rows);
            // Compute stats from the live snapshot
            const s = { total: rows.length, passed: 0, failed: 0, flaky: 0 };
            rows.forEach(r => {
              if      (r.status === 'passed') s.passed++;
              else if (r.status === 'failed') s.failed++;
              else if (r.status === 'flaky')  s.flaky++;
            });
            setStats(s);
            setLoading(false);
          },
          (err) => {
            console.error('[useTestResultsListener]', err);
            setError(err.message || 'Failed to load test results');
            setLoading(false);
          }
        );

        return () => unsub();
      }, [projectId]);

      return { results, loading, error, stats };
    }

    // ─────────────────────────────────────────────────────────────
    // useQuestionBank
    // Drives the project-type question tree defined in QUESTION_BANK.
    // Tracks current question, collected answers, and assembled
    // requirement IDs triggered by each answer selection.
    //
    // Returns:
    //   currentQuestion   — the active question object
    //   progress          — { current, total }
    //   goToNext(option)  — record answer, advance (follows next_question
    //                       from the chosen option, or goes sequential)
    //   goBack()          — step back one question
    //   isComplete        — true when all questions answered
    //   answers           — { [questionId]: selectedOption }
    //   triggeredRequirements — deduplicated set of triggered req IDs
    // ─────────────────────────────────────────────────────────────
    function useQuestionBank(projectType) {
      const questions = (QUESTION_BANK[projectType] || {}).questions || [];

      const [historyStack,  setHistoryStack]  = useState([0]);   // stack of indices visited
      const [answers,       setAnswers]        = useState({});
      const [triggeredReqs, setTriggeredReqs]  = useState(new Set());
      const [isComplete,    setIsComplete]     = useState(false);

      const currentIndex   = historyStack[historyStack.length - 1];
      const currentQuestion = questions[currentIndex] || null;
      const total           = questions.length;

      // Resolve the next question index given a chosen option
      function resolveNextIndex(option, currentIdx) {
        if (option.next_question) {
          // next_question is a question ID string — find its index
          const targetIdx = questions.findIndex(q => q.id === option.next_question);
          if (targetIdx !== -1) return targetIdx;
        }
        // Default: sequential
        return currentIdx + 1;
      }

      function goToNext(selectedOption) {
        if (!currentQuestion) return;

        // Record the answer
        setAnswers(prev => ({ ...prev, [currentQuestion.id]: selectedOption }));

        // Accumulate triggered requirements (deduplicated)
        setTriggeredReqs(prev => {
          const next = new Set(prev);
          (selectedOption.triggers_requirements || []).forEach(r => next.add(r));
          return next;
        });

        // Determine next question
        const nextIdx = resolveNextIndex(selectedOption, currentIndex);

        if (nextIdx >= total) {
          setIsComplete(true);
        } else {
          setHistoryStack(prev => [...prev, nextIdx]);
        }
      }

      function goBack() {
        if (historyStack.length <= 1) return;
        setHistoryStack(prev => prev.slice(0, -1));
        // Remove the answer for the question we're going back from
        if (currentQuestion) {
          setAnswers(prev => {
            const next = { ...prev };
            delete next[currentQuestion.id];
            return next;
          });
        }
        setIsComplete(false);
      }

      function reset() {
        setHistoryStack([0]);
        setAnswers({});
        setTriggeredReqs(new Set());
        setIsComplete(false);
      }

      return {
        currentQuestion,
        progress:             { current: historyStack.length, total },
        goToNext,
        goBack,
        reset,
        isComplete,
        answers,
        triggeredRequirements: Array.from(triggeredReqs),
      };
    }

    // ─────────────────────────────────────────────────────────────
    // useVaultSearch
    // Searches VAULT entries by keyword overlap against a query string.
    // Returns ranked results with classification label.
    //
    // Classification thresholds (normalised 0–1):
    //   >= 0.6  → 'vault_hit'    (use as-is or minor edits)
    //   >= 0.3  → 'adapt_needed' (significant customisation needed)
    //   < 0.3   → 'generate_fresh' (build from scratch)
    //
    // Returns: { results, searching }
    //   results: [{ entry, score, classification, matchedTags }]
    // ─────────────────────────────────────────────────────────────
    function useVaultSearch(searchQuery) {
      const [results,   setResults]   = useState([]);
      const [searching, setSearching] = useState(false);

      useEffect(() => {
        if (!searchQuery || !searchQuery.trim()) {
          setResults([]);
          return;
        }

        setSearching(true);

        // Small async tick so the UI can show the searching state
        const timer = setTimeout(() => {
          const tokens = searchQuery.toLowerCase()
            .split(/[\s,_-]+/)
            .filter(t => t.length > 2);

          const scored = (VAULT || []).map(entry => {
            const haystack = [
              ...(entry.tags        || []),
              ...(entry.description || '').toLowerCase().split(/\s+/),
              entry.name.toLowerCase(),
              entry.id.replace(/_/g, ' '),
            ];
            const matchedTags = tokens.filter(t => haystack.some(h => h.includes(t)));
            const rawScore    = matchedTags.length / Math.max(tokens.length, 1);
            // Boost by tier (tier 1 = highest utility = stronger signal)
            const tierBoost   = entry.tier === 1 ? 0.05 : entry.tier === 2 ? 0.02 : 0;
            const score       = Math.min(1, rawScore + tierBoost);

            const classification = classifyVaultHit(score);

            return { entry, score, classification: classification.label, matchedTags };
          });

          const filtered = scored
            .filter(r => r.score > 0)
            .sort((a, b) => b.score - a.score);

          setResults(filtered);
          setSearching(false);
        }, 80);

        return () => clearTimeout(timer);
      }, [searchQuery]);

      return { results, searching };
    }

    // ─────────────────────────────────────────────────────────────
    // useWallet
    // Manages MetaMask / injected wallet connection state.
    // Uses ethers.js v6 (window.ethers loaded via UMD CDN):
    //   provider = new ethers.BrowserProvider(window.ethereum)
    //   signer   = await provider.getSigner()
    //   wei values are native BigInt (not ethers.BigNumber — that's v5)
    //
    // Returns:
    //   address, chainId, connected, connecting, error,
    //   connect(), switchToAmoy(), sendTransaction(to, valuePOL)
    // ─────────────────────────────────────────────────────────────
    function useWallet() {
      const [address,    setAddress]    = useState('');
      const [chainId,    setChainId]    = useState('');
      const [connected,  setConnected]  = useState(false);
      const [connecting, setConnecting] = useState(false);
      const [error,      setError]      = useState('');

      // Sync state when the user switches accounts or chains externally
      useEffect(() => {
        if (!window.ethereum) return;

        function onAccountsChanged(accounts) {
          if (accounts.length === 0) {
            setAddress('');
            setConnected(false);
          } else {
            setAddress(accounts[0]);
            setConnected(true);
          }
        }

        function onChainChanged(id) {
          setChainId(id);
        }

        window.ethereum.on('accountsChanged', onAccountsChanged);
        window.ethereum.on('chainChanged',    onChainChanged);

        // Check if already connected (no popup — just reads cached accounts)
        window.ethereum.request({ method: 'eth_accounts' }).then(accounts => {
          if (accounts.length > 0) {
            setAddress(accounts[0]);
            setConnected(true);
            window.ethereum.request({ method: 'eth_chainId' }).then(id => setChainId(id));
          }
        }).catch(() => {});

        return () => {
          window.ethereum.removeListener('accountsChanged', onAccountsChanged);
          window.ethereum.removeListener('chainChanged',    onChainChanged);
        };
      }, []);

      // connect — triggers MetaMask popup
      async function connect() {
        if (!window.ethereum) {
          setError('MetaMask is not installed. Please install it from metamask.io.');
          return;
        }
        setError('');
        setConnecting(true);
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          const id       = await window.ethereum.request({ method: 'eth_chainId' });
          setAddress(accounts[0]);
          setChainId(id);
          setConnected(true);
        } catch (err) {
          setError(err.code === 4001 ? 'Connection rejected by user.' : (err.message || 'Connection failed.'));
        } finally {
          setConnecting(false);
        }
      }

      // switchToAmoy — switch network; add if not present
      async function switchToAmoy() {
        if (!window.ethereum) { setError('MetaMask not installed.'); return; }
        setError('');
        try {
          await window.ethereum.request({
            method: 'wallet_switchEthereumChain',
            params: [{ chainId: AMOY_CONFIG.chainId }],
          });
        } catch (switchErr) {
          // Error 4902 = chain not added to wallet yet
          if (switchErr.code === 4902) {
            try {
              await window.ethereum.request({
                method: 'wallet_addEthereumChain',
                params: [AMOY_CONFIG],
              });
            } catch (addErr) {
              setError('Failed to add Polygon Amoy network: ' + (addErr.message || addErr));
            }
          } else {
            setError('Failed to switch network: ' + (switchErr.message || switchErr));
          }
        }
      }

      // sendTransaction — ethers v6 pattern, value in POL (string), returns receipt
      async function sendTransaction(to, valuePOL) {
        if (!window.ethereum || !window.ethers) {
          throw new Error('Wallet or ethers.js not available.');
        }
        // ethers v6: BrowserProvider (NOT Web3Provider — that was v5)
        const provider = new window.ethers.BrowserProvider(window.ethereum);
        const signer   = await provider.getSigner();
        // parseEther returns native BigInt in v6 — NOT ethers.BigNumber
        const tx = await signer.sendTransaction({
          to,
          value: window.ethers.parseEther(String(valuePOL)),
        });
        const receipt = await tx.wait();
        return receipt;
      }

      return {
        address,
        chainId,
        connected,
        connecting,
        error,
        connect,
        switchToAmoy,
        sendTransaction,
        isOnAmoy: chainId === AMOY_CONFIG.chainId,
        truncated: address ? truncateAddress(address) : '',
      };
    }


    // ═══════════════════════════════════════════════════════════════
    // UTILITY FUNCTIONS
    // ═══════════════════════════════════════════════════════════════

    // ─────────────────────────────────────────────────────────────
    // PRICING RATES — mirrors the backend rates so the UI can compute
    // running cost estimates without an API call.
    // Keys map to cost_impact.category from QUESTION_BANK options.
    // ─────────────────────────────────────────────────────────────
    const PRICING_RATES = {
      auth:            { low: 2000,  medium: 4000,  high: 8000  },
      dashboard:       { low: 3000,  medium: 6000,  high: 12000 },
      crud:            { low: 1500,  medium: 3000,  high: 6000  },
      payment:         { low: 5000,  medium: 8000,  high: 15000 },
      api_integration: { low: 2500,  medium: 5000,  high: 10000 },
      ui_component:    { low: 1000,  medium: 2000,  high: 4000  },
      analytics:       { low: 2000,  medium: 5000,  high: 10000 },
      infrastructure:  { low: 1000,  medium: 2500,  high: 6000  },
      integration:     { low: 2500,  medium: 5000,  high: 10000 },
      feature:         { low: 2000,  medium: 4000,  high: 8000  },
      design:          { low: 800,   medium: 1500,  high: 3000  },
      default:         { low: 2000,  medium: 4000,  high: 8000  },
    };

    // Discount applied to a requirement's base cost when a matching
    // VAULT entry is found (less custom code = less cost)
    const VAULT_DISCOUNTS = {
      vault_hit:      0.70,   // pay only 30% (70% done already)
      adapt_needed:   0.40,   // pay only 60% (40% done already)
      generate_fresh: 0.00,   // full cost — nothing reusable
    };

    // How much to multiply base cost by per complexity level
    const COMPLEXITY_MULTIPLIERS = {
      low:       1.0,
      medium:    1.3,
      high:      1.8,
      very_high: 2.5,
      none:      0.0,
    };

    // ─────────────────────────────────────────────────────────────
    // formatINR
    // Formats a number using the Indian lakh/crore numbering system.
    // e.g. 1250000 → "₹12,50,000"
    // ─────────────────────────────────────────────────────────────
    function formatINR(amount) {
      if (amount === null || amount === undefined || isNaN(amount)) return '₹0';
      const num   = Math.round(Number(amount));
      const str   = String(Math.abs(num));
      const sign  = num < 0 ? '-' : '';
      // Indian grouping: last 3 digits, then groups of 2
      let result  = '';
      if (str.length <= 3) {
        result = str;
      } else {
        result = str.slice(-3);
        let rest = str.slice(0, -3);
        while (rest.length > 2) {
          result = rest.slice(-2) + ',' + result;
          rest   = rest.slice(0, -2);
        }
        result = rest + ',' + result;
      }
      return sign + '₹' + result;
    }

    // ─────────────────────────────────────────────────────────────
    // formatPOL
    // Formats a POL amount (bigint or number) to 4 decimal places.
    // Input can be a wei bigint or a POL float string/number.
    // ─────────────────────────────────────────────────────────────
    function formatPOL(amount) {
      if (amount === null || amount === undefined) return '0.0000 POL';
      let val;
      try {
        // If it looks like a bigint (> 1e15), treat as wei
        if (typeof amount === 'bigint' || Number(amount) > 1e15) {
          val = Number(BigInt(amount)) / 1e18;
        } else {
          val = Number(amount);
        }
      } catch {
        val = 0;
      }
      return val.toFixed(4) + ' POL';
    }

    // ─────────────────────────────────────────────────────────────
    // truncateAddress
    // Returns a truncated Ethereum address: 0x1234...abcd
    // ─────────────────────────────────────────────────────────────
    function truncateAddress(addr) {
      if (!addr || typeof addr !== 'string') return '';
      if (addr.length < 10) return addr;
      return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    // ─────────────────────────────────────────────────────────────
    // classifyVaultHit
    // Maps a normalised match score (0–1) to a label + UI colours.
    // ─────────────────────────────────────────────────────────────
    function classifyVaultHit(score) {
      if (score >= 0.6) return {
        label:   'vault_hit',
        display: 'Vault Hit',
        color:   'text-[#22C55E]',
        bgColor: 'bg-[#22C55E]/10',
        border:  'border-[#22C55E]/30',
        badge:   '⚡ Vault Hit',
      };
      if (score >= 0.3) return {
        label:   'adapt_needed',
        display: 'Adapt Needed',
        color:   'text-[#F59E0B]',
        bgColor: 'bg-[#F59E0B]/10',
        border:  'border-[#F59E0B]/30',
        badge:   '🔧 Adapt Needed',
      };
      return {
        label:   'generate_fresh',
        display: 'Generate Fresh',
        color:   'text-[#94A3B8]',
        bgColor: 'bg-[#334155]/40',
        border:  'border-[#334155]',
        badge:   '✨ Generate Fresh',
      };
    }

    // ─────────────────────────────────────────────────────────────
    // calculateRunningCost
    // Computes total INR cost estimate from an array of triggered
    // requirement IDs and their corresponding vault lookup results.
    //
    // requirements: string[]  — e.g. ["product_catalog", "cart_basic"]
    // vaultLookups: { [reqId]: 'vault_hit' | 'adapt_needed' | 'generate_fresh' }
    //
    // Returns: { total, breakdown: [{ id, base, discount, final }] }
    // ─────────────────────────────────────────────────────────────
    function calculateRunningCost(requirements, vaultLookups = {}) {
      let total     = 0;
      const breakdown = [];

      (requirements || []).forEach(reqId => {
        const template   = REQUIREMENT_TEMPLATES[reqId];
        if (!template) return;

        const category   = template.category  || 'default';
        const complexity = template.complexity || 'medium';
        const rates      = PRICING_RATES[category] || PRICING_RATES.default;
        const baseRate   = rates[complexity]        || rates.medium;
        const multiplier = COMPLEXITY_MULTIPLIERS[complexity] || 1.0;
        const baseCost   = baseRate * multiplier;

        const vaultClass  = vaultLookups[reqId] || 'generate_fresh';
        const discount    = VAULT_DISCOUNTS[vaultClass] || 0;
        const finalCost   = Math.round(baseCost * (1 - discount));

        total += finalCost;
        breakdown.push({
          id:         reqId,
          base:       Math.round(baseCost),
          vaultClass,
          discount:   Math.round(discount * 100),
          final:      finalCost,
          category,
          complexity,
          hours:      template.estimated_hours || 0,
        });
      });

      return {
        total,
        formatted: formatINR(total),
        breakdown: breakdown.sort((a, b) => b.final - a.final),
        totalHours: breakdown.reduce((s, r) => s + r.hours, 0),
      };
    }

    // ─────────────────────────────────────────────────────────────
    // calculateConfidenceScore
    // Returns a 0–100 confidence score for a requirement, weighted by:
    //   - how well the vault matched (vaultScore 0–1)
    //   - whether the requirement has an acceptance criterion
    //   - whether it has a technical spec
    //   - whether it has dependencies resolved
    // ─────────────────────────────────────────────────────────────
    function calculateConfidenceScore(requirementId, vaultScore = 0) {
      const template = REQUIREMENT_TEMPLATES[requirementId];
      if (!template) return 0;

      let score = 0;

      // Vault match contribution (40 points max)
      score += Math.round(vaultScore * 40);

      // Has acceptance criterion (GIVEN-WHEN-THEN) — 25 points
      if (template.acceptance_criterion && template.acceptance_criterion.includes('GIVEN')) {
        score += 25;
      }

      // Has technical spec — 20 points
      if (template.technical_spec && template.technical_spec.length > 20) {
        score += 20;
      }

      // Has explicit dependencies list — 10 points
      if (Array.isArray(template.dependencies)) {
        score += 10;
      }

      // Complexity penalty: very_high = -5 (harder to be confident)
      if (template.complexity === 'very_high') score -= 5;

      return Math.min(100, Math.max(0, score));
    }

    // ─────────────────────────────────────────────────────────────
    // checkRegulatoryFlags
    // Scans an array of requirement IDs for keywords that may
    // indicate regulatory, compliance, or legal implications.
    // Returns an array of flag objects.
    // ─────────────────────────────────────────────────────────────
    const REGULATORY_KEYWORDS = {
      GDPR:          ['user_data', 'email', 'personal', 'profile', 'gdpr', 'privacy'],
      PCI_DSS:       ['payment', 'card', 'stripe', 'razorpay', 'upi', 'billing', 'invoice'],
      KYC_AML:       ['kyc', 'aml', 'identity', 'verification', 'crypto', 'wallet', 'blockchain'],
      DPDPA:         ['indian_user', 'aadhaar', 'pan', 'india', 'dpdpa'],
      DATA_RESIDENCY: ['export', 'import', 'backup', 'database', 'storage'],
    };

    function checkRegulatoryFlags(requirements) {
      const flags = [];
      const reqText = requirements.join(' ').toLowerCase();

      Object.entries(REGULATORY_KEYWORDS).forEach(([reg, keywords]) => {
        const matched = keywords.filter(k => reqText.includes(k));
        if (matched.length > 0) {
          flags.push({
            regulation: reg,
            severity:   matched.length >= 2 ? 'high' : 'medium',
            matchedOn:  matched,
            message:    `${reg} considerations may apply — review data handling requirements.`,
          });
        }
      });

      return flags;
    }

    // ─────────────────────────────────────────────────────────────
    // checkContentPolicy
    // Scans free-text input against a red-flag keyword list.
    // Returns { passed: bool, flags: string[] }
    // Used to screen project descriptions before sending to the AI.
    // ─────────────────────────────────────────────────────────────
    const CONTENT_POLICY_REDFLAGS = [
      'hack', 'exploit', 'malware', 'phishing', 'ransomware',
      'scrape without permission', 'credential stuffing', 'sql injection',
      'ddos', 'spam', 'pyramid scheme', 'ponzi', 'money laundering',
      'bypass security', 'illegal', 'darkweb', 'dark web',
    ];

    function checkContentPolicy(text) {
      if (!text) return { passed: true, flags: [] };
      const lower = text.toLowerCase();
      const flags = CONTENT_POLICY_REDFLAGS.filter(kw => lower.includes(kw));
      return {
        passed: flags.length === 0,
        flags,
        message: flags.length > 0
          ? 'Project description contains terms that conflict with our usage policy: ' + flags.join(', ')
          : '',
      };
    }

    // ─────────────────────────────────────────────────────────────
    // assembleRequirement
    // Merges a question bank answer with a REQUIREMENT_TEMPLATES
    // entry to produce a final, personalised requirement object
    // ready for the SRS and AI code generator.
    // ─────────────────────────────────────────────────────────────
    function assembleRequirement(questionAnswer, requirementId) {
      const template = REQUIREMENT_TEMPLATES[requirementId];
      if (!template) return null;

      return {
        ...template,
        requirement_id:  template.requirement_id,
        source_question: questionAnswer ? questionAnswer.id        : null,
        chosen_option:   questionAnswer ? questionAnswer.value     : null,
        chosen_label:    questionAnswer ? questionAnswer.label     : null,
        assembled_at:    new Date().toISOString(),
        cost_estimate:   calculateRunningCost([requirementId], {}),
        confidence:      calculateConfidenceScore(requirementId, 0),
      };
    }

    // ─────────────────────────────────────────────────────────────
    // generateRequirementId
    // Generates a unique requirement ID string like "REQ_A3F9K2".
    // Used when creating ad-hoc requirements not in the template bank.
    // ─────────────────────────────────────────────────────────────
    function generateRequirementId() {
      const chars  = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let suffix   = '';
      for (let i = 0; i < 6; i++) {
        suffix += chars[Math.floor(Math.random() * chars.length)];
      }
      return 'REQ_' + suffix;
    }

    // ─────────────────────────────────────────────────────────────
    // getTimeAgo
    // Converts a timestamp (Date, Firestore Timestamp, or ms number)
    // to a human-readable "X minutes ago" string.
    // ─────────────────────────────────────────────────────────────
    function getTimeAgo(timestamp) {
      if (!timestamp) return 'just now';

      let ms;
      if (timestamp && typeof timestamp.toMillis === 'function') {
        // Firestore Timestamp object
        ms = timestamp.toMillis();
      } else if (timestamp instanceof Date) {
        ms = timestamp.getTime();
      } else {
        ms = Number(timestamp);
      }

      const seconds = Math.floor((Date.now() - ms) / 1000);
      if (seconds < 5)  return 'just now';
      if (seconds < 60) return `${seconds} second${seconds === 1 ? '' : 's'} ago`;

      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes} minute${minutes === 1 ? '' : 's'} ago`;

      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours} hour${hours === 1 ? '' : 's'} ago`;

      const days = Math.floor(hours / 24);
      if (days < 30) return `${days} day${days === 1 ? '' : 's'} ago`;

      const months = Math.floor(days / 30);
      if (months < 12) return `${months} month${months === 1 ? '' : 's'} ago`;

      const years = Math.floor(months / 12);
      return `${years} year${years === 1 ? '' : 's'} ago`;
    }

    // ─────────────────────────────────────────────────────────────
    // debounce
    // Returns a debounced version of fn that only fires after
    // ms milliseconds of silence since the last call.
    // The returned function also has a .cancel() method.
    // ─────────────────────────────────────────────────────────────
    function debounce(fn, ms = 300) {
      let timer = null;
      function debounced(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => {
          timer = null;
          fn.apply(this, args);
        }, ms);
      }
      debounced.cancel = () => { clearTimeout(timer); timer = null; };
      return debounced;
    }

    // ─────────────────────────────────────────────────────────────
    // computeSHA256
    // Returns a hex SHA-256 digest of the input string.
    // Uses the browser's native crypto.subtle — no external library.
    // Async — returns a Promise<string>.
    // ─────────────────────────────────────────────────────────────
    async function computeSHA256(text) {
      const encoder  = new TextEncoder();
      const data     = encoder.encode(text);
      const hashBuf  = await crypto.subtle.digest('SHA-256', data);
      const hashArr  = Array.from(new Uint8Array(hashBuf));
      return hashArr.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Component: RunningCostPanel — sidebar showing requirements + cost
    // ═══════════════════════════════════════════════════════════════
    function RunningCostPanel({ requirements = [], vaultLookups = {} }) {
      const prevCountRef = React.useRef(0);
      const listRef = React.useRef(null);

      // Scroll to bottom when a new item is added
      React.useEffect(() => {
        if (requirements.length > prevCountRef.current && listRef.current) {
          listRef.current.scrollTo({ top: listRef.current.scrollHeight, behavior: 'smooth' });
        }
        prevCountRef.current = requirements.length;
      }, [requirements.length]);

      const totalCost = requirements.reduce((sum, r) => sum + (r.cost || 0), 0);
      const vaultHits = requirements.filter(r => (vaultLookups[r.id] || r.vaultStatus) === 'hit').length;
      const vaultEfficiency = requirements.length > 0
        ? Math.round((vaultHits / requirements.length) * 100)
        : 0;

      function formatINR(n) {
        return '₹' + n.toLocaleString('en-IN');
      }

      function VaultBadge({ status }) {
        const cfg = {
          hit:   { bg: 'bg-[#10B981]/15 text-[#10B981] border-[#10B981]/30', label: 'Vault Hit' },
          adapt: { bg: 'bg-[#F59E0B]/15 text-[#F59E0B] border-[#F59E0B]/30', label: 'Adapt' },
          fresh: { bg: 'bg-[#EF4444]/15 text-[#EF4444] border-[#EF4444]/30', label: 'Fresh' },
        }[status] || { bg: 'bg-[#334155] text-[#64748B] border-[#334155]', label: '—' };
        return (
          <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded border ${cfg.bg}`}>{cfg.label}</span>
        );
      }

      return (
        <div className="flex flex-col h-full bg-[#0F172A] border border-[#334155] rounded-2xl overflow-hidden">

          {/* Panel header */}
          <div className="px-4 py-3 border-b border-[#334155] flex items-center gap-2">
            <svg className="w-4 h-4 text-[#3B82F6]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <h3 className="text-[#F8FAFC] font-semibold text-sm">Running Cost</h3>
          </div>

          {/* Scrollable requirements list */}
          <div ref={listRef} className="flex-1 overflow-y-auto px-3 py-3 space-y-2">
            {requirements.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-10 text-center">
                <svg className="w-8 h-8 text-[#334155] mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                <p className="text-[#475569] text-xs">Requirements will appear<br/>as you answer questions</p>
              </div>
            ) : (
              requirements.map((req, i) => {
                const vaultStatus = vaultLookups[req.id] || req.vaultStatus || 'fresh';
                return (
                  <div key={req.id || i}
                    className="bg-[#1E293B] border border-[#334155] rounded-lg px-3 py-2.5 animate-slideUp">
                    <p className="text-[#CBD5E1] text-xs leading-snug mb-2 line-clamp-2">
                      {req.plain_description || req.description || 'Requirement'}
                    </p>
                    <div className="flex items-center justify-between">
                      <VaultBadge status={vaultStatus} />
                      <span className="text-[#F8FAFC] text-xs font-bold">{formatINR(req.cost || 0)}</span>

            <div className="flex items-center justify-between">
              <span className="text-[#64748B] text-xs">Vault Efficiency</span>

    // ═══════════════════════════════════════════════════════════════
    // Component: NegotiationPage — options-based question flow
    // ═══════════════════════════════════════════════════════════════
    function NegotiationPage({ projectId, projectType, onComplete, challengeMode }) {
      const questions = (QUESTION_BANK[projectType] || {}).questions || [];

      // Challenge-mode state: user types a sentence, we pick a tree
      const [challengeInput,  setChallengeInput]  = React.useState('');
      const [challengeReady,  setChallengeReady]  = React.useState(!challengeMode);
      const [detectedType,    setDetectedType]    = React.useState(projectType || 'ecommerce');

      // Question flow state
      const [history,        setHistory]        = React.useState([]); // stack of answered question ids
      const [currentId,      setCurrentId]      = React.useState(questions[0]?.id || null);
      const [answers,        setAnswers]         = React.useState({});
      const [showOtherInput, setShowOtherInput]  = React.useState(false);
      const [otherText,      setOtherText]       = React.useState('');
      const [requirements,   setRequirements]    = React.useState([]);
      const [vaultLookups,   setVaultLookups]    = React.useState({});
      const [done,           setDone]            = React.useState(false);
      const [compiling,      setCompiling]       = React.useState(false);

      const COST_TABLE = { none: 0, low: 3500, medium: 8000, high: 18000, very_high: 35000 };

      const currentQuestion = questions.find(q => q.id === currentId);
      const questionIndex   = questions.findIndex(q => q.id === currentId);
      const category        = currentQuestion?.category || '';

      const CATEGORY_LABELS = {
        core_feature: '⚡ Core Features',
        auth:         '🔐 Authentication',
        design:       '🎨 Design & UI',
        data:         '🗄️ Data & Storage',
        payment:      '💳 Payments',
        integration:  '🔗 Integrations',
        deployment:   '🚀 Deployment',
        analytics:    '📊 Analytics',
      };

      function handleChallengeSubmit() {
        // Simple keyword detection — in real app, would call AI
        const lower = challengeInput.toLowerCase();
        let picked = 'ecommerce';
        if (lower.includes('book') || lower.includes('appoint') || lower.includes('schedul')) picked = 'booking';
        else if (lower.includes('dashboard') || lower.includes('analytics') || lower.includes('report')) picked = 'dashboard';
        else if (lower.includes('saas') || lower.includes('tool') || lower.includes('platform')) picked = 'saas';
        else if (lower.includes('portfolio') || lower.includes('landing') || lower.includes('personal')) picked = 'portfolio';
        setDetectedType(picked);
        setChallengeReady(true);
      }

      function selectOption(option) {
        const newAnswers = { ...answers, [currentId]: option.value };
        setAnswers(newAnswers);
        setShowOtherInput(false);
        setOtherText('');

        // Add triggered requirements
        const newReqs = (option.triggers_requirements || []).map(reqId => {
          const vStatus = Math.random() > 0.5 ? 'hit' : Math.random() > 0.5 ? 'adapt' : 'fresh';
          const cost = COST_TABLE[option.cost_impact?.complexity || 'low'];
          return {
            id:                reqId + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
            plain_description: reqId.replace(/_/g, ' '),
            vaultStatus:       vStatus,
            cost:              cost + Math.floor(Math.random() * 1000),
          };
        });
        if (newReqs.length) {
          setRequirements(prev => [...prev, ...newReqs]);
        }

        // Navigate to next question
        const nextId = option.next_question;
        if (nextId) {
          setHistory(prev => [...prev, currentId]);
          setCurrentId(nextId);
        } else {
          // No explicit next — go to next question in array
          const nextQ = questions[questionIndex + 1];
          if (nextQ) {
            setHistory(prev => [...prev, currentId]);
            setCurrentId(nextQ.id);
          } else {
            setDone(true);
          }
        }
      }

      function handleOtherSubmit() {
        if (!otherText.trim()) return;
        const cost = COST_TABLE['medium'];
        const customReq = {
          id:                'custom_' + Date.now(),
          plain_description: otherText.trim(),
          vaultStatus:       'fresh',
          cost:              cost,
        };
        setRequirements(prev => [...prev, customReq]);
        const nextQ = questions[questionIndex + 1];
        if (nextQ) {
          setHistory(prev => [...prev, currentId]);
          setCurrentId(nextQ.id);
        } else {
          setDone(true);
        }
        setShowOtherInput(false);
        setOtherText('');
      }

      function goBack() {
        if (history.length === 0) return;
        const prevId = history[history.length - 1];
        setHistory(prev => prev.slice(0, -1));
        setCurrentId(prevId);
        setShowOtherInput(false);
        setDone(false);
      }

      async function compileSRS() {
        setCompiling(true);
        // Assemble locally (POST /api/compile-srs stub)
        await new Promise(r => setTimeout(r, 1200));

        // Build a mock SRS JSON from collected requirements
        const milestones = {};
        requirements.forEach((req, i) => {
          const m = Math.floor(i / 3) + 1;
          if (!milestones[m]) milestones[m] = { id: m, name: `Milestone ${m}`, requirements: [] };
          milestones[m].requirements.push({
            ...req,
            requirement_id:    `REQ-${String(i + 1).padStart(3, '0')}`,
            complexity:        ['low', 'medium', 'high'][i % 3],
            technical_spec:    `Technical specification for ${req.plain_description}.`,
            acceptance_criterion: `Acceptance criterion: ${req.plain_description} works as expected.`,
            confidence:        50 + Math.floor(Math.random() * 50),
            milestone:         m,
          });
        });

        const srsJson = {
          projectId,
          milestones:   Object.values(milestones),
          totalCost:    requirements.reduce((s, r) => s + (r.cost || 0), 0),
          contradictions: [],
        };

        setCompiling(false);
        if (onComplete) onComplete(srsJson);
      }

      // ── Challenge mode gate ──
      if (challengeMode && !challengeReady) {
        return (
          <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC] flex items-center justify-center px-4">
            <div className="w-full max-w-xl animate-fadeIn">
              <div className="bg-[#1E293B] border border-[#334155] rounded-2xl p-8">
                <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-[#A855F7]/10 border border-[#A855F7]/30 text-[#A855F7] text-xs font-semibold mb-6">
                  ⚡ Challenge Mode
                </div>
                <h2 className="text-2xl font-bold text-[#F8FAFC] mb-3">Describe your app in one sentence</h2>
                <p className="text-[#64748B] text-sm mb-6">We'll analyze your idea and start the right requirements tree automatically.</p>
                <textarea
                  value={challengeInput}
                  onChange={e => setChallengeInput(e.target.value.slice(0, 250))}
                  placeholder="e.g. A marketplace where Indian farmers can sell produce directly to urban buyers"
                  rows={4}
                  className="w-full bg-[#0F172A] border border-[#334155] focus:border-[#3B82F6] rounded-xl px-4 py-3 text-[#F8FAFC] text-sm placeholder-[#475569] focus:outline-none resize-none transition-colors mb-3"/>
                <div className="flex items-center justify-between mb-5">
                  <span className="text-[#475569] text-xs">{challengeInput.length} / 250 chars</span>
                </div>
                <button onClick={handleChallengeSubmit} disabled={challengeInput.trim().length < 10}
                  className="w-full py-4 rounded-xl bg-[#A855F7] hover:bg-[#9333EA] text-white font-bold text-base transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                  Analyze & Start →
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ── Main two-column layout ──
      return (
        <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC]">
          <div className="max-w-7xl mx-auto px-4 py-8">
            <div className="flex gap-6 items-start">

              {/* LEFT — 60% */}
              <div className="flex-[3] min-w-0">

                {/* Top bar */}
                <div className="flex items-center justify-between mb-6">
                  <div>
                    <h1 className="text-xl font-bold text-[#F8FAFC]">Build Your Requirements</h1>
                    {!done && currentQuestion && (
                      <p className="text-[#64748B] text-sm mt-0.5">
                        Question {questionIndex + 1} of ~{questions.length}
                      </p>
                    )}
                  </div>
                  {history.length > 0 && !done && (
                    <button onClick={goBack}
                      className="flex items-center gap-1.5 text-[#64748B] hover:text-[#94A3B8] text-sm transition-colors">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/>
                      </svg>
                      Back
                    </button>
                  )}
                </div>

                {!done ? (
                  <div className="animate-fadeIn" key={currentId}>

                    {/* Category label */}
                    {category && (
                      <p className="text-[#64748B] text-xs font-semibold uppercase tracking-widest mb-3">
                        {CATEGORY_LABELS[category] || category}
                      </p>
                    )}

                    {/* Question */}
                    <div className="bg-[#1E293B] border border-[#334155] rounded-2xl p-7">
                      <h2 className="text-xl font-bold text-[#F8FAFC] mb-6 leading-snug">
                        {currentQuestion?.question || 'Loading…'}
                      </h2>

                      {/* Options */}
                      <div className="space-y-3">
                        {(currentQuestion?.options || []).map(opt => (
                          <button key={opt.value} onClick={() => selectOption(opt)}
                            className={"w-full px-5 py-4 rounded-xl border text-left text-sm font-medium transition-all duration-150 " +
                              (answers[currentId] === opt.value
                                ? 'border-[#3B82F6] bg-[#3B82F6]/15 text-[#F8FAFC]'
                                : 'border-[#334155] text-[#CBD5E1] hover:border-[#3B82F6] hover:bg-[#3B82F6]/5')}>
                            {opt.label}
                          </button>
                        ))}

                        {/* Other option */}
                        <button onClick={() => { setShowOtherInput(!showOtherInput); setOtherText(''); }}
                          className={"w-full px-5 py-4 rounded-xl border text-left text-sm font-medium transition-all duration-150 " +
                            (showOtherInput
                              ? 'border-[#A855F7] bg-[#A855F7]/10 text-[#F8FAFC]'
                              : 'border-[#334155] text-[#94A3B8] hover:border-[#A855F7] hover:bg-[#A855F7]/5')}>
                          Other — describe briefly
                        </button>

                        {showOtherInput && (
                          <div className="animate-fadeIn space-y-3 pt-1">
                            <textarea
                              value={otherText}
                              onChange={e => setOtherText(e.target.value.slice(0, 200))}
                              placeholder="Describe your specific requirement…"
                              rows={3}
                              className="w-full bg-[#0F172A] border border-[#334155] focus:border-[#A855F7] rounded-xl px-4 py-3 text-[#F8FAFC] text-sm placeholder-[#475569] focus:outline-none resize-none transition-colors"/>
                            <button onClick={handleOtherSubmit} disabled={otherText.trim().length < 3}
                              className="px-6 py-2.5 rounded-lg bg-[#A855F7] hover:bg-[#9333EA] text-white font-semibold text-sm transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                              Submit →
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ) : (
                  // All questions answered — Compile CTA
                  <div className="bg-[#1E293B] border border-[#334155] rounded-2xl p-8 text-center animate-fadeIn">
                    <div className="w-14 h-14 rounded-2xl bg-[#10B981]/20 flex items-center justify-center mx-auto mb-5">
                      <svg className="w-8 h-8 text-[#10B981]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                      </svg>
                    </div>
                    <h2 className="text-2xl font-bold text-[#F8FAFC] mb-2">All requirements captured!</h2>
                    <p className="text-[#64748B] text-sm mb-8">
                      {requirements.length} requirement{requirements.length !== 1 ? 's' : ''} collected. Ready to compile your SRS document.
                    </p>
                    <button onClick={compileSRS} disabled={compiling}
                      className="px-8 py-4 rounded-xl bg-[#3B82F6] hover:bg-[#2563EB] text-white font-bold text-base transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2 mx-auto">
                      {compiling && (
                        <svg className="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                        </svg>
                      )}
                      {compiling ? 'Compiling SRS…' : '📄 Compile Your SRS'}
                    </button>
                  </div>
                )}
              </div>

              {/* RIGHT — 40% */}
              <div className="flex-[2] min-w-0 sticky top-20" style={{ minHeight: 500 }}>
                <RunningCostPanel requirements={requirements} vaultLookups={vaultLookups} />
              </div>

            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // Component: ContradictionReviewPage — resolve conflicts
    // ═══════════════════════════════════════════════════════════════
    function ContradictionReviewPage({ contradictions = [], onResolveAll }) {
      const [resolutions, setResolutions] = React.useState({});

      const allResolved = contradictions.length > 0 &&
        contradictions.every((_, i) => resolutions[i] !== undefined);

      function setResolution(i, value) {
        setResolutions(prev => ({ ...prev, [i]: value }));
      }

      function handleConfirm() {
        if (!allResolved) return;
        onResolveAll(resolutions);
      }

      if (contradictions.length === 0) {
        return (
          <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC] flex items-center justify-center px-4">
            <div className="text-center animate-fadeIn">
              <div className="w-16 h-16 rounded-2xl bg-[#10B981]/20 flex items-center justify-center mx-auto mb-5">
                <svg className="w-9 h-9 text-[#10B981]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <h2 className="text-2xl font-bold text-[#F8FAFC] mb-2">No conflicts found</h2>
              <p className="text-[#64748B] text-sm">Your requirements are consistent. Proceeding to review.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC] px-4 py-10">
          <div className="max-w-4xl mx-auto">

            {/* Header */}
            <div className="mb-8 animate-fadeIn">
              <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-[#EF4444]/10 border border-[#EF4444]/30 text-[#EF4444] text-xs font-semibold mb-4">
                ⚠ Conflict Detection
              </div>
              <h1 className="text-2xl font-bold text-[#F8FAFC] mb-1">
                We found {contradictions.length} potential conflict{contradictions.length !== 1 ? 's' : ''} in your requirements
              </h1>
              <p className="text-[#64748B] text-sm">Resolve each conflict below before we can lock your SRS.</p>
            </div>

            {/* Contradictions */}
            <div className="space-y-8">
              {contradictions.map((item, i) => (
                <div key={i} className="bg-[#1E293B] border border-[#334155] rounded-2xl p-6 animate-slideUp">

                  {/* Two cards + connector */}
                  <div className="flex items-center gap-4 mb-5">
                    <div className="flex-1 bg-[#0F172A] border border-[#334155] rounded-xl p-4">
                      <p className="text-[#64748B] text-[10px] font-semibold uppercase tracking-wide mb-1">Requirement A</p>
                      <p className="text-[#F8FAFC] text-sm font-medium leading-snug">
                        {item.reqA?.plain_description || item.reqA || 'Requirement A'}
                      </p>
                    </div>
                    <div className="flex flex-col items-center gap-0.5 flex-shrink-0">
                      <div className="w-px h-4 bg-[#EF4444]" />
                      <div className="w-5 h-5 rounded-full bg-[#EF4444]/20 border border-[#EF4444] flex items-center justify-center">
                        <svg className="w-3 h-3 text-[#EF4444]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                      </div>
                      <div className="w-px h-4 bg-[#EF4444]" />
                    </div>
                    <div className="flex-1 bg-[#0F172A] border border-[#334155] rounded-xl p-4">
                      <p className="text-[#64748B] text-[10px] font-semibold uppercase tracking-wide mb-1">Requirement B</p>
                      <p className="text-[#F8FAFC] text-sm font-medium leading-snug">
                        {item.reqB?.plain_description || item.reqB || 'Requirement B'}
                      </p>
                    </div>
                  </div>

                  {/* Conflict explanation */}
                  <div className="flex items-start gap-2 mb-5 px-4 py-3 bg-[#F59E0B]/5 border border-[#F59E0B]/20 rounded-xl">
                    <svg className="w-4 h-4 text-[#F59E0B] flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <p className="text-[#FCD34D] text-sm">
                      <strong>Conflict:</strong> {item.explanation || 'These requirements may conflict with each other.'}
                    </p>
                  </div>

                  {/* Resolution options */}
                  <div className="space-y-2">
                    <p className="text-[#94A3B8] text-xs font-semibold uppercase tracking-wide mb-3">Choose a resolution</p>
                    {[
                      { value: 'keep_a', label: `Keep Requirement A, modify Requirement B` },
                      { value: 'keep_b', label: `Keep Requirement B, modify Requirement A` },
                      { value: 'compromise', label: item.compromise ? `Compromise: ${item.compromise}` : 'Compromise: find a middle-ground approach' },
                    ].map(opt => (
                      <label key={opt.value}
                        className={"flex items-start gap-3 px-4 py-3 rounded-xl border cursor-pointer transition-all " +
                          (resolutions[i] === opt.value
                            ? 'border-[#3B82F6] bg-[#3B82F6]/10'
                            : 'border-[#334155] hover:border-[#475569]')}>
                        <input
                          type="radio"
                          name={`conflict_${i}`}
                          value={opt.value}
                          checked={resolutions[i] === opt.value}
                          onChange={() => setResolution(i, opt.value)}
                          className="mt-0.5 accent-[#3B82F6]"
                        />
                        <span className="text-[#CBD5E1] text-sm leading-snug">{opt.label}</span>
                      </label>
                    ))}
                  </div>

                </div>
              ))}
            </div>

            {/* Footer CTA */}
            <div className="mt-8 flex justify-end">
              <button onClick={handleConfirm} disabled={!allResolved}
                className="px-8 py-4 rounded-xl bg-[#3B82F6] hover:bg-[#2563EB] text-white font-bold text-base transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                Confirm Resolutions →
              </button>
            </div>

          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // Component: SRSReviewPage — review and confirm requirements
    // ═══════════════════════════════════════════════════════════════
    function SRSReviewPage({ projectId, srsJson = {}, onConfirm }) {
      const [expanded,     setExpanded]     = React.useState({});
      const [flagged,      setFlagged]      = React.useState({});
      const [confirming,   setConfirming]   = React.useState(false);

      const milestones = srsJson.milestones || [];
      const allRequirements = milestones.flatMap(m => m.requirements || []);
      const totalCost = srsJson.totalCost || allRequirements.reduce((s, r) => s + (r.cost || 0), 0);
      const avgConfidence = allRequirements.length
        ? Math.round(allRequirements.reduce((s, r) => s + (r.confidence || 70), 0) / allRequirements.length)
        : 0;
      const regulatoryFlags = srsJson.regulatoryFlags || [];

      function toggleExpand(id) {
        setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
      }
      function toggleFlag(id) {
        setFlagged(prev => ({ ...prev, [id]: !prev[id] }));
      }

      async function handleConfirm() {
        setConfirming(true);
        await new Promise(r => setTimeout(r, 800));
        setConfirming(false);
        if (onConfirm) onConfirm({ projectId, srsJson, flagged });
      }

      function ConfidenceBadge({ score }) {
        const cfg = score >= 70
          ? 'bg-[#10B981]/15 text-[#10B981] border-[#10B981]/30'
          : score >= 50
          ? 'bg-[#F59E0B]/15 text-[#F59E0B] border-[#F59E0B]/30'
          : 'bg-[#EF4444]/15 text-[#EF4444] border-[#EF4444]/30';
        return (
          <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded border ${cfg}`}>
            {score}/100
          </span>
        );
      }

      function ComplexityBadge({ level }) {
        const cfg = {
          low:    'bg-[#10B981]/10 text-[#10B981]',
          medium: 'bg-[#F59E0B]/10 text-[#F59E0B]',
          high:   'bg-[#EF4444]/10 text-[#EF4444]',
        }[level] || 'bg-[#334155] text-[#64748B]';
        return (
          <span className={`text-[10px] font-semibold px-2 py-0.5 rounded uppercase tracking-wide ${cfg}`}>
            {level}
          </span>
        );
      }

      function VaultBadge({ status }) {
        const cfg = {
          hit:   'bg-[#10B981]/15 text-[#10B981] border-[#10B981]/30',
          adapt: 'bg-[#F59E0B]/15 text-[#F59E0B] border-[#F59E0B]/30',
          fresh: 'bg-[#EF4444]/15 text-[#EF4444] border-[#EF4444]/30',
        }[status] || 'bg-[#334155] text-[#64748B] border-[#334155]';
        const label = { hit: 'Vault Hit', adapt: 'Adapt', fresh: 'Fresh' }[status] || '—';
        return (
          <span className={`text-[10px] font-semibold px-1.5 py-0.5 rounded border ${cfg}`}>{label}</span>
        );
      }

      return (
        <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC] px-4 py-10">
          <div className="max-w-4xl mx-auto">

            {/* Header */}
            <div className="flex items-start justify-between mb-6 animate-fadeIn">
              <div>
                <h1 className="text-2xl font-bold text-[#F8FAFC] flex items-center gap-3">
                  Review Your Requirements
                  <span className="inline-flex items-center px-3 py-1 rounded-full bg-[#3B82F6]/20 border border-[#3B82F6]/30 text-[#3B82F6] text-sm font-semibold">
                    {allRequirements.length}
                  </span>
                </h1>
                <p className="text-[#64748B] text-sm mt-1">
                  Confirm or flag requirements before we lock your SRS.
                </p>
              </div>
            </div>

            {/* Summary banner */}
            <div className="bg-gradient-to-r from-[#1E293B] to-[#0F172A] border border-[#334155] rounded-2xl px-6 py-5 mb-6 flex flex-wrap gap-6 items-center animate-slideUp">
              <div>
                <p className="text-[#64748B] text-xs font-semibold uppercase tracking-wide mb-1">Requirements</p>
                <p className="text-[#F8FAFC] font-bold text-lg">{allRequirements.length} across {milestones.length} milestone{milestones.length !== 1 ? 's' : ''}</p>
              </div>
              <div className="w-px h-10 bg-[#334155] hidden sm:block" />
              <div>
                <p className="text-[#64748B] text-xs font-semibold uppercase tracking-wide mb-1">Estimated Total</p>
                <p className="text-[#F8FAFC] font-bold text-lg">₹{totalCost.toLocaleString('en-IN')}</p>
              </div>
              <div className="w-px h-10 bg-[#334155] hidden sm:block" />
              <div>
                <p className="text-[#64748B] text-xs font-semibold uppercase tracking-wide mb-1">Avg Confidence</p>
                <p className={`font-bold text-lg ${avgConfidence >= 70 ? 'text-[#10B981]' : avgConfidence >= 50 ? 'text-[#F59E0B]' : 'text-[#EF4444]'}`}>
                  {avgConfidence}/100
                </p>
              </div>
            </div>

            {/* Regulatory flags banner */}
            {regulatoryFlags.length > 0 && (
              <div className="mb-6 px-5 py-4 bg-[#F97316]/10 border border-[#F97316]/30 rounded-2xl flex items-start gap-3 animate-fadeIn">
                <svg className="w-5 h-5 text-[#F97316] flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <div>
                  <p className="text-[#F97316] font-semibold text-sm mb-1">Regulatory Flags</p>
                  <ul className="space-y-1">
                    {regulatoryFlags.map((flag, i) => (
                      <li key={i} className="text-[#FED7AA] text-xs">• {flag}</li>
                    ))}
                  </ul>
                </div>
              </div>
            )}

            {/* Milestones + requirements */}
            <div className="space-y-8">
              {milestones.map((milestone, mi) => (
                <div key={milestone.id || mi} className="animate-slideUp">
                  <div className="flex items-center gap-3 mb-4">
                    <div className="w-7 h-7 rounded-full bg-[#3B82F6]/20 border border-[#3B82F6]/40 flex items-center justify-center text-[#3B82F6] text-xs font-bold flex-shrink-0">
                      {mi + 1}
                    </div>
                    <h2 className="text-[#F8FAFC] font-semibold text-base">
                      Milestone {mi + 1} — {milestone.name || `Phase ${mi + 1}`}
                    </h2>
                    <div className="flex-1 h-px bg-[#1E293B]" />
                    <span className="text-[#64748B] text-xs">{(milestone.requirements || []).length} req{(milestone.requirements || []).length !== 1 ? 's' : ''}</span>
                  </div>

                  <div className="space-y-3">
                    {(milestone.requirements || []).map((req) => {
                      const isExpanded = expanded[req.id];
                      const isFlagged  = flagged[req.id];
                      return (
                        <div key={req.id}
                          className={"bg-[#1E293B] border rounded-xl overflow-hidden transition-all " +
                            (isFlagged ? 'border-[#F59E0B]/50' : 'border-[#334155]')}>

                          {/* Top row */}
                          <div className="px-5 py-4 flex items-start gap-3">
                            <div className="flex-1 min-w-0">
                              {/* Badges row */}
                              <div className="flex flex-wrap items-center gap-2 mb-2">
                                <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-[#3B82F6]/20 text-[#3B82F6] border border-[#3B82F6]/30">
                                  {req.requirement_id || req.id}
                                </span>
                                <ComplexityBadge level={req.complexity || 'medium'} />
                                <ConfidenceBadge score={req.confidence || 70} />
                                <VaultBadge status={req.vaultStatus || 'fresh'} />
                              </div>
                              {/* Main description */}
                              <p className="text-[#CBD5E1] text-sm leading-relaxed capitalize">
                                {req.plain_description || 'Requirement description'}
                              </p>
                            </div>
                            {/* Actions */}
                            <div className="flex items-center gap-2 flex-shrink-0">
                              <button onClick={() => toggleFlag(req.id)}
                                className={"px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all border " +
                                  (isFlagged
                                    ? 'bg-[#F59E0B]/20 text-[#F59E0B] border-[#F59E0B]/40'
                                    : 'bg-transparent text-[#64748B] border-[#334155] hover:border-[#F59E0B]/40 hover:text-[#F59E0B]')}>
                                {isFlagged ? '🚩 Flagged' : 'Flag'}
                              </button>
                              <button onClick={() => toggleExpand(req.id)}
                                className="px-2.5 py-1.5 rounded-lg text-xs font-medium text-[#64748B] hover:text-[#94A3B8] border border-[#334155] hover:border-[#475569] transition-all">
                                {isExpanded ? 'Less ▲' : 'More ▼'}
                              </button>
                            </div>
                          </div>

                          {/* Expandable section */}
                          {isExpanded && (
                            <div className="px-5 pb-5 space-y-4 border-t border-[#334155] pt-4 animate-fadeIn">
                              {req.technical_spec && (
                                <div>
                                  <p className="text-[#475569] text-[10px] font-semibold uppercase tracking-wide mb-1.5">Technical Spec</p>
                                  <p className="text-[#94A3B8] text-xs leading-relaxed">{req.technical_spec}</p>
                                </div>
                              )}
                              {req.acceptance_criterion && (
                                <div className="border-l-4 border-[#3B82F6] pl-4 bg-[#3B82F6]/5 rounded-r-lg py-3 pr-3">
                                  <p className="text-[#475569] text-[10px] font-semibold uppercase tracking-wide mb-1.5">Acceptance Criterion</p>
                                  <p className="text-[#CBD5E1] text-xs leading-relaxed">{req.acceptance_criterion}</p>
                                </div>
                              )}
                            </div>
                          )}

                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}

              {milestones.length === 0 && (
                <div className="text-center py-16 text-[#475569] text-sm">
                  No requirements to review yet.
                </div>
              )}
            </div>

            {/* Bottom actions */}
            <div className="mt-10 flex items-center justify-between gap-4 pt-6 border-t border-[#1E293B]">
              <button onClick={() => window.history.back()}
                className="text-[#64748B] hover:text-[#94A3B8] text-sm underline underline-offset-2 transition-colors">
                ← Back to Negotiation
              </button>
              <button onClick={handleConfirm} disabled={confirming || milestones.length === 0}
                className="px-8 py-4 rounded-xl bg-[#3B82F6] hover:bg-[#2563EB] text-white font-bold text-base transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
                {confirming && (
                  <svg className="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                  </svg>
                )}
                {confirming ? 'Locking…' : '🔒 Confirm SRS & Lock'}
              </button>
            </div>

          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // Component: PricingPage — itemised cost breakdown
    // ═══════════════════════════════════════════════════════════════
    function PricingPage({ projectId, srsJson = {}, vaultLookups = {}, onConfirm }) {
      const [polPrice,   setPolPrice]   = React.useState(70);   // fallback = ₹70/POL
      const [removed,    setRemoved]    = React.useState({});    // reqId → true
      const [confirming, setConfirming] = React.useState(false);

      // Try CoinGecko; fall back to hardcoded 70
      React.useEffect(() => {
        fetch('https://api.coingecko.com/api/v3/simple/price?ids=matic-network&vs_currencies=inr')
          .then(r => r.json())
          .then(d => { if (d?.['matic-network']?.inr) setPolPrice(d['matic-network'].inr); })
          .catch(() => {});
      }, []);

      const milestones = (srsJson.milestones || []).map(m => ({
        ...m,
        requirements: (m.requirements || []).filter(r => !removed[r.id]),
      }));

      // ── Per-requirement pricing ────────────────────────────────
      function calcReqCost(req) {
        const cat        = req.category || 'default';
        const complexity = req.complexity || 'medium';
        const rates      = PRICING_RATES[cat] || PRICING_RATES.default;
        const baseRate   = rates[complexity] || rates.medium;
        const multiplier = COMPLEXITY_MULTIPLIERS[complexity] || 1.0;
        const vStatus    = vaultLookups[req.id] || req.vaultStatus || 'generate_fresh';
        const discountKey = vStatus === 'hit' ? 'vault_hit' : vStatus === 'adapt' ? 'adapt_needed' : 'generate_fresh';
        const discount   = VAULT_DISCOUNTS[discountKey] || 0;
        const hours      = req.estimated_hours || Math.round(baseRate / 800);
        const cost       = Math.round(baseRate * multiplier * (1 - discount));
        return { hours, baseRate, discount, cost };
      }

      // ── Subtotal (all active requirements) ────────────────────
      const allReqs = milestones.flatMap(m => m.requirements || []);
      const subtotal      = allReqs.reduce((s, r) => s + calcReqCost(r).cost, 0);
      const platformFee   = Math.round(subtotal * 0.20);
      const escrowFee     = Math.round(subtotal * 0.02);
      const grandTotal    = subtotal + platformFee + escrowFee;
      const grandTotalPOL = polPrice > 0 ? (grandTotal / polPrice).toFixed(4) : '—';

      const originalTotal  = (srsJson.totalCost || subtotal);
      const vaultSavings   = Math.max(0, originalTotal - subtotal);
      const vaultHitCount  = allReqs.filter(r => (vaultLookups[r.id] || r.vaultStatus) === 'hit').length;

      function removeReq(id) { setRemoved(prev => ({ ...prev, [id]: true })); }

      async function handleConfirm() {
        setConfirming(true);
        await new Promise(r => setTimeout(r, 600));
        setConfirming(false);
        if (onConfirm) onConfirm({ subtotal, platformFee, escrowFee, grandTotal, grandTotalPOL, milestones });
      }

      function VaultDiscountCell({ vStatus }) {
        if (vStatus === 'hit')   return <span className="text-[#10B981] font-semibold text-xs">70% off</span>;
        if (vStatus === 'adapt') return <span className="text-[#F59E0B] font-semibold text-xs">40% off</span>;
        return <span className="text-[#475569] text-xs">—</span>;
      }

      function CategoryBadge({ cat }) {
        const colors = {
          auth: 'bg-[#3B82F6]/10 text-[#3B82F6]', payment: 'bg-[#10B981]/10 text-[#10B981]',
          crud: 'bg-[#F59E0B]/10 text-[#F59E0B]', design: 'bg-[#A855F7]/10 text-[#A855F7]',
          infrastructure: 'bg-[#EF4444]/10 text-[#EF4444]', integration: 'bg-[#06B6D4]/10 text-[#06B6D4]',
        };
        const cls = colors[cat] || 'bg-[#334155] text-[#94A3B8]';
        return <span className={`text-[10px] font-semibold px-2 py-0.5 rounded uppercase tracking-wide ${cls}`}>{cat || 'feature'}</span>;
      }

      return (
        <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC] px-4 py-10">
          <div className="max-w-5xl mx-auto">

            {/* Header */}
            <div className="mb-6 animate-fadeIn">
              <h1 className="text-2xl font-bold text-[#F8FAFC] mb-1">Project Pricing</h1>
              <p className="text-[#64748B] text-sm">Review, adjust, and confirm your itemised quote.</p>
            </div>

            {/* Summary banner */}
            <div className="bg-gradient-to-r from-[#1E3A5F] to-[#0F172A] border border-[#3B82F6]/30 rounded-2xl px-6 py-5 mb-5 animate-slideUp">
              <p className="text-[#64748B] text-xs font-semibold uppercase tracking-wide mb-1">Grand Total</p>
              <p className="text-[#F8FAFC] text-3xl font-extrabold tracking-tight">
                {formatINR(grandTotal)}
                <span className="text-[#64748B] text-base font-normal ml-3">≈ {grandTotalPOL} POL</span>
              </p>
            </div>

            {/* Vault savings callout */}
            {vaultSavings > 0 && (
              <div className="flex items-center gap-3 bg-[#10B981]/10 border border-[#10B981]/30 rounded-xl px-5 py-3 mb-6 animate-fadeIn">
                <svg className="w-5 h-5 text-[#10B981] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <p className="text-[#10B981] text-sm font-medium">
                  Vault saved you <strong>{formatINR(vaultSavings)}</strong> — {vaultHitCount} component{vaultHitCount !== 1 ? 's' : ''} retrieved from vault
                </p>
              </div>
            )}

            {/* Milestone tables */}
            {milestones.map((milestone, mi) => {
              const mTotal = (milestone.requirements || []).reduce((s, r) => s + calcReqCost(r).cost, 0);
              return (
                <div key={milestone.id || mi} className="mb-8 animate-slideUp">
                  <div className="flex items-center gap-3 mb-3">
                    <h2 className="text-[#94A3B8] text-xs font-bold uppercase tracking-widest">
                      Milestone {mi + 1} — {milestone.name || `Phase ${mi + 1}`}
