                    </h2>
                    <div className="flex-1 h-px bg-[#1E293B]" />
                  </div>
                  <div className="bg-[#1E293B] border border-[#334155] rounded-xl overflow-hidden">
                    {/* Table header */}
                    <div className="grid grid-cols-[1fr_100px_60px_80px_90px_80px_32px] gap-3 px-4 py-3 border-b border-[#334155] bg-[#0F172A]/50">
                      {['Requirement','Category','Hours','Rate','Vault Disc.','Cost',''].map((h,i) => (
                        <span key={i} className="text-[#475569] text-[10px] font-bold uppercase tracking-wide">{h}</span>
                      ))}
                    </div>
                    {/* Rows */}
                    {(milestone.requirements || []).map(req => {
                      const { hours, baseRate, discount, cost } = calcReqCost(req);
                      const vStatus = vaultLookups[req.id] || req.vaultStatus || 'fresh';
                      return (
                        <div key={req.id}
                          className="grid grid-cols-[1fr_100px_60px_80px_90px_80px_32px] gap-3 px-4 py-3 border-b border-[#1E293B] hover:bg-[#0F172A]/30 transition-colors items-center">
                          <p className="text-[#CBD5E1] text-xs leading-snug truncate capitalize">{req.plain_description || 'Requirement'}</p>
                          <CategoryBadge cat={req.category} />
                          <span className="text-[#94A3B8] text-xs">{hours}h</span>
                          <span className="text-[#94A3B8] text-xs">{formatINR(baseRate)}</span>
                          <VaultDiscountCell vStatus={vStatus} />
                          <span className="text-[#F8FAFC] text-xs font-bold">{formatINR(cost)}</span>
                          <button onClick={() => removeReq(req.id)}
                            className="w-6 h-6 rounded flex items-center justify-center text-[#475569] hover:text-[#EF4444] hover:bg-[#EF4444]/10 transition-colors">
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                          </button>
                        </div>
                      );
                    })}
                    {/* Milestone subtotal */}
                    <div className="grid grid-cols-[1fr_100px_60px_80px_90px_80px_32px] gap-3 px-4 py-3 bg-[#0F172A]/60 items-center">
                      <span className="text-[#94A3B8] text-xs font-bold uppercase tracking-wide col-span-5 text-right pr-2">Milestone Subtotal</span>
                      <span className="text-[#F8FAFC] text-sm font-extrabold">{formatINR(mTotal)}</span>
                      <span />
                    </div>
                  </div>
                </div>
              );
            })}

            {milestones.length === 0 && (
              <div className="text-center py-16 text-[#475569] text-sm">No requirements to price.</div>
            )}

            {/* Totals card */}
            <div className="bg-[#1E293B] border border-[#334155] rounded-2xl px-6 py-6 mb-8 max-w-sm ml-auto animate-slideUp">
              <div className="space-y-3">
                <div className="flex justify-between items-center">
                  <span className="text-[#64748B] text-sm">Subtotal</span>
                  <span className="text-[#F8FAFC] text-sm font-semibold">{formatINR(subtotal)}</span>
                </div>
                <div className="flex justify-between items-center">
                  <span className="text-[#64748B] text-sm">Platform Fee <span className="text-[#475569] text-xs">(20%)</span></span>
                  <span className="text-[#F8FAFC] text-sm font-semibold">{formatINR(platformFee)}</span>
                </div>
                <div className="flex justify-between items-center">
                  <span className="text-[#64748B] text-sm">Escrow Fee <span className="text-[#475569] text-xs">(2%)</span></span>
                  <span className="text-[#F8FAFC] text-sm font-semibold">{formatINR(escrowFee)}</span>
                </div>
                <div className="h-px bg-[#334155]" />
                <div className="flex justify-between items-center">
                  <span className="text-[#F8FAFC] font-bold">Grand Total</span>
                  <div className="text-right">
                    <p className="text-[#F8FAFC] font-extrabold text-lg">{formatINR(grandTotal)}</p>
                    <p className="text-[#64748B] text-xs">≈ {grandTotalPOL} POL</p>
                  </div>
                </div>
              </div>
            </div>

            {/* CTA */}
            <div className="flex justify-end">
              <button onClick={handleConfirm} disabled={confirming || allReqs.length === 0}
                className="px-8 py-4 rounded-xl bg-[#3B82F6] hover:bg-[#2563EB] text-white font-bold text-base transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
                {confirming && <svg className="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>}
                {confirming ? 'Preparing contract…' : 'Confirm Price & Proceed →'}
              </button>
            </div>

          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // Component: ContractPage — deploy + wallet + deposit POL on Amoy
    // ═══════════════════════════════════════════════════════════════
    function ContractPage({ projectId, pricingBreakdown = {}, onFunded }) {
      const wallet = useWallet();

      // Steps: 1=deploy 2=connect 3=recovery 4=deposit 5=funded
      const [step,            setStep]            = React.useState(1);
      const [deploying,       setDeploying]        = React.useState(false);
      const [contractAddress, setContractAddress]  = React.useState('');
      const [deployError,     setDeployError]      = React.useState('');
      const [recoveryWallets, setRecoveryWallets]  = React.useState(['', '', '']);
      const [recoveryError,   setRecoveryError]    = React.useState('');
      const [depositStatus,   setDepositStatus]    = React.useState('idle'); // idle|sending|confirming|confirmed
      const [txHash,          setTxHash]           = React.useState('');
      const [depositError,    setDepositError]     = React.useState('');

      const polAmount = (pricingBreakdown || {}).grandTotalPOL || '0.5';

      // ── Step 1: Deploy ─────────────────────────────────────────
      async function handleDeploy() {
        setDeploying(true);
        setDeployError('');
        try {
          // Mock: POST /api/deploy-contract → fake address after 3s
          await new Promise(r => setTimeout(r, 3000));
          const fakeAddr = '0x' + Array.from({length: 40}, () => '0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
          setContractAddress(fakeAddr);
          setStep(2);
        } catch (err) {
          setDeployError('Deployment failed: ' + (err.message || err));
        } finally {
          setDeploying(false);
        }
      }

      // Auto-deploy on mount
      React.useEffect(() => {
        if (step === 1 && !contractAddress && !deploying) handleDeploy();
      }, []);

      // ── Step 2: Connect wallet ─────────────────────────────────
      async function handleConnect() {
        await wallet.connect();
        if (!wallet.error) setStep(3);
      }

      React.useEffect(() => {
        if (step === 2 && wallet.connected) setStep(3);
      }, [wallet.connected, step]);

      // ── Step 3: Recovery wallets validation ────────────────────
      function validateRecovery(wallets) {
        const re = /^0x[0-9a-fA-F]{40}$/;
        if (wallets.some(w => w && !re.test(w))) return 'Invalid address format. Must be 0x + 40 hex chars.';
        const filled = wallets.filter(Boolean);
        if (new Set(filled).size !== filled.length) return 'All addresses must be unique.';
        return '';
      }

      function handleRecoveryChange(i, val) {
        const updated = [...recoveryWallets];
        updated[i] = val;
        setRecoveryWallets(updated);
        setRecoveryError(validateRecovery(updated));
      }

      function handleRegisterRecovery() {
        const err = validateRecovery(recoveryWallets);
        if (err) { setRecoveryError(err); return; }
        setStep(4);
      }

      // ── Step 4: Deposit POL ───────────────────────────────────
      async function handleDeposit() {
        setDepositError('');

        // Demo fallback — no MetaMask
        if (!window.ethereum) {
          setDepositStatus('sending');
          await new Promise(r => setTimeout(r, 1000));
          setDepositStatus('confirming');
          await new Promise(r => setTimeout(r, 1500));
          const demoHash = '0x' + Array.from({length: 64}, () => '0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
          setTxHash(demoHash);
          setDepositStatus('confirmed');
          setStep(5);
          return;
        }

        // Ensure Amoy network
        if (!wallet.isOnAmoy) {
          await wallet.switchToAmoy();
          if (wallet.error) { setDepositError(wallet.error); return; }
        }

        try {
          setDepositStatus('sending');
          const provider = new window.ethers.BrowserProvider(window.ethereum);
          const signer   = await provider.getSigner();
          const tx = await signer.sendTransaction({
            to:    contractAddress,
            value: window.ethers.parseEther(String(polAmount)),
          });
          setDepositStatus('confirming');
          const receipt = await tx.wait();
          setTxHash(receipt.hash);
          setDepositStatus('confirmed');
          setStep(5);
        } catch (err) {
          setDepositStatus('idle');
          setDepositError(err.message || 'Transaction failed.');
        }
      }

      // ── Step 5: auto-navigate after 2s ────────────────────────
      React.useEffect(() => {
        if (step === 5) {
          const t = setTimeout(() => { if (onFunded) onFunded({ contractAddress, txHash }); }, 2000);
          return () => clearTimeout(t);
        }
      }, [step]);

      // ── Step indicator ─────────────────────────────────────────
      const STEPS = ['Deploy Contract', 'Connect Wallet', 'Recovery Wallets', 'Deposit POL', 'Funded!'];
      function StepIndicator() {
        return (
          <div className="flex items-center gap-0 mb-10">
            {STEPS.map((label, i) => {
              const n        = i + 1;
              const done     = n < step;
              const active   = n === step;
              const spinning = n === 1 && deploying;
              return (
                <React.Fragment key={n}>
                  <div className="flex flex-col items-center">
                    <div className={`w-9 h-9 rounded-full border-2 flex items-center justify-center transition-all
                      ${done   ? 'border-[#10B981] bg-[#10B981]/20'
                               : active ? 'border-[#3B82F6] bg-[#3B82F6]/20'
                               : 'border-[#334155] bg-transparent'}`}>
                      {done ? (
                        <svg className="w-4 h-4 text-[#10B981]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/>
                        </svg>
                      ) : spinning ? (
                        <svg className="animate-spin w-4 h-4 text-[#3B82F6]" fill="none" viewBox="0 0 24 24">
                          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                        </svg>
                      ) : (
                        <span className={`text-xs font-bold ${active ? 'text-[#3B82F6]' : 'text-[#475569]'}`}>{n}</span>
                      )}
                    </div>
                    <span className={`text-[10px] font-medium mt-1.5 text-center max-w-[70px] leading-tight
                      ${done ? 'text-[#10B981]' : active ? 'text-[#3B82F6]' : 'text-[#475569]'}`}>
                      {label}
                    </span>
                  </div>
                  {i < STEPS.length - 1 && (
                    <div className={`flex-1 h-0.5 mb-5 mx-1 ${done ? 'bg-[#10B981]/50' : 'bg-[#1E293B]'}`} />
                  )}
                </React.Fragment>
              );
            })}
          </div>
        );
      }

      function CopyButton({ text }) {
        const [copied, setCopied] = React.useState(false);
        function copy() {
          navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
        }
        return (
          <button onClick={copy}
            className="ml-2 px-2 py-1 rounded text-[10px] font-semibold border border-[#334155] text-[#64748B] hover:text-[#F8FAFC] hover:border-[#475569] transition-colors">
            {copied ? '✓ Copied' : 'Copy'}
          </button>
        );
      }

      return (
        <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC] px-4 py-10">
          <div className="max-w-2xl mx-auto">

            <div className="mb-8 animate-fadeIn">
              <h1 className="text-2xl font-bold text-[#F8FAFC] mb-1">Smart Contract Setup</h1>
              <p className="text-[#64748B] text-sm">Deploy your escrow contract and fund your project on Polygon Amoy.</p>
            </div>

            <StepIndicator />

            {/* Step panels */}
            <div className="bg-[#1E293B] border border-[#334155] rounded-2xl p-7 animate-fadeIn">

              {/* STEP 1 */}
              {step === 1 && (
                <div className="text-center">
                  {deploying ? (
                    <>
                      <svg className="animate-spin h-12 w-12 text-[#3B82F6] mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                      </svg>
                      <p className="text-[#F8FAFC] font-semibold text-base">Deploying smart contract to Polygon Amoy…</p>
                      <p className="text-[#64748B] text-sm mt-2">This takes about 3 seconds in demo mode.</p>
                    </>
                  ) : deployError ? (
                    <>
                      <p className="text-[#EF4444] text-sm mb-4">{deployError}</p>
                      <button onClick={handleDeploy} className="px-6 py-3 rounded-xl bg-[#3B82F6] hover:bg-[#2563EB] text-white font-bold text-sm transition-all">Retry Deploy</button>
                    </>
                  ) : null}
                </div>
              )}

              {/* STEP 2 */}
              {step === 2 && (
                <div>
                  <h2 className="text-lg font-bold text-[#F8FAFC] mb-2">Contract Deployed ✓</h2>
                  <div className="flex items-center flex-wrap gap-2 mb-6 p-3 bg-[#0F172A] rounded-xl border border-[#334155]">
                    <span className="text-[#64748B] text-xs">Address:</span>
                    <span className="text-[#3B82F6] text-xs font-mono break-all">{contractAddress}</span>
                    <CopyButton text={contractAddress} />
                    <a href={`https://amoy.polygonscan.com/address/${contractAddress}`} target="_blank" rel="noreferrer"
                      className="text-[#64748B] hover:text-[#3B82F6] text-[10px] underline ml-1">Polygonscan ↗</a>
                  </div>
                  <h2 className="text-lg font-bold text-[#F8FAFC] mb-4">Connect Your Wallet</h2>
                  {!window.ethereum ? (
                    <div className="px-4 py-3 rounded-xl bg-[#F59E0B]/10 border border-[#F59E0B]/30 text-[#FCD34D] text-sm mb-4">
                      MetaMask not detected. <a href="https://metamask.io" target="_blank" rel="noreferrer" className="underline">Install MetaMask ↗</a>
                    </div>
                  ) : (
                    <button onClick={handleConnect} disabled={wallet.connecting}
                      className="w-full py-4 rounded-xl bg-[#F6851B] hover:bg-[#E2761B] text-white font-bold text-base transition-all disabled:opacity-50 flex items-center justify-center gap-2">
                      {wallet.connecting && <svg className="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>}
                      🦊 {wallet.connecting ? 'Connecting…' : 'Connect MetaMask'}
                    </button>
                  )}
                  {wallet.error && <p className="text-[#EF4444] text-sm mt-3">{wallet.error}</p>}
                </div>
              )}

              {/* STEP 3 */}
              {step === 3 && (
                <div>
                  <div className="flex items-center gap-2 mb-1">
                    <div className="w-2 h-2 rounded-full bg-[#10B981]" />
                    <span className="text-[#10B981] text-xs font-semibold">Connected: {wallet.truncated}</span>
                  </div>
                  {!wallet.isOnAmoy && (
                    <div className="mb-4 mt-3 flex items-center gap-3 px-4 py-3 bg-[#F59E0B]/10 border border-[#F59E0B]/30 rounded-xl">
                      <p className="text-[#FCD34D] text-xs flex-1">Wrong network — please switch to Polygon Amoy.</p>
                      <button onClick={wallet.switchToAmoy} className="px-3 py-1.5 rounded-lg bg-[#F59E0B] text-white text-xs font-bold">Switch</button>
                    </div>
                  )}
                  <h2 className="text-lg font-bold text-[#F8FAFC] mb-2 mt-4">Recovery Wallets <span className="text-[#64748B] text-sm font-normal">(Optional)</span></h2>
                  <p className="text-[#64748B] text-xs mb-5">Add up to 3 trusted addresses. Any 2 of 3 can recover funds with a 72-hour timelock.</p>
                  <div className="space-y-3 mb-5">
                    {recoveryWallets.map((w, i) => (
                      <div key={i}>
                        <label className="block text-[#94A3B8] text-xs font-medium mb-1">Recovery Wallet {i + 1}</label>
                        <input value={w} onChange={e => handleRecoveryChange(i, e.target.value)}
                          placeholder="0x..."
                          className="w-full bg-[#0F172A] border border-[#334155] focus:border-[#3B82F6] rounded-lg px-4 py-3 text-[#F8FAFC] text-xs font-mono placeholder-[#475569] focus:outline-none transition-colors"/>
                      </div>
                    ))}
                  </div>
                  {recoveryError && <p className="text-[#EF4444] text-xs mb-3">{recoveryError}</p>}
                  <div className="flex items-center gap-3">
                    <button onClick={handleRegisterRecovery} disabled={!!recoveryError}
                      className="flex-1 py-3 rounded-xl bg-[#3B82F6] hover:bg-[#2563EB] text-white font-bold text-sm transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                      Register Recovery Wallets →
                    </button>
                    <button onClick={() => setStep(4)} className="text-[#64748B] hover:text-[#94A3B8] text-sm underline underline-offset-2 transition-colors">
                      Skip for now
                    </button>
                  </div>
                </div>
              )}

              {/* STEP 4 */}
              {step === 4 && (
                <div>
                  <h2 className="text-lg font-bold text-[#F8FAFC] mb-2">Deposit POL</h2>
                  <p className="text-[#64748B] text-sm mb-6">
                    Send <strong className="text-[#F8FAFC]">{polAmount} POL</strong> to the escrow contract to activate your project.
                  </p>

                  {depositStatus === 'idle' && (
                    <button onClick={handleDeposit}
                      className="w-full py-4 rounded-xl bg-[#A855F7] hover:bg-[#9333EA] text-white font-bold text-base transition-all flex items-center justify-center gap-2">
                      💜 Deposit {polAmount} POL
                    </button>
                  )}

                  {depositStatus === 'sending' && (
                    <div className="flex items-center gap-3 px-4 py-4 bg-[#A855F7]/10 border border-[#A855F7]/30 rounded-xl">
                      <svg className="animate-spin h-5 w-5 text-[#A855F7] flex-shrink-0" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                      <p className="text-[#C4B5FD] text-sm font-medium">Sending transaction…</p>
                    </div>
                  )}

                  {depositStatus === 'confirming' && (
                    <div className="flex items-center gap-3 px-4 py-4 bg-[#F59E0B]/10 border border-[#F59E0B]/30 rounded-xl">
                      <svg className="animate-spin h-5 w-5 text-[#F59E0B] flex-shrink-0" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                      <p className="text-[#FCD34D] text-sm font-medium">Waiting for confirmation on-chain…</p>
                    </div>
                  )}

                  {depositError && <p className="text-[#EF4444] text-sm mt-3">{depositError}</p>}

                  {!window.ethereum && (
                    <p className="text-[#64748B] text-xs mt-4 italic">Demo Mode: MetaMask not detected — will simulate deposit.</p>
                  )}
                </div>
              )}

              {/* STEP 5 */}
              {step === 5 && (
                <div className="text-center animate-fadeIn">
                  <div className="w-16 h-16 rounded-full bg-[#10B981]/20 border-2 border-[#10B981] flex items-center justify-center mx-auto mb-5">
                    <svg className="w-9 h-9 text-[#10B981]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/>
                    </svg>
                  </div>
                  <h2 className="text-2xl font-bold text-[#F8FAFC] mb-2">Your project is funded! 🎉</h2>
                  <p className="text-[#64748B] text-sm mb-5">Navigating to build dashboard in a moment…</p>
                  {txHash && (
                    <div className="flex items-center justify-center gap-2 flex-wrap mb-5">
                      <span className="text-[#64748B] text-xs">Tx:</span>
                      <span className="text-[#3B82F6] text-xs font-mono">{txHash.slice(0,18)}…</span>
                      <a href={`https://amoy.polygonscan.com/tx/${txHash}`} target="_blank" rel="noreferrer"
                        className="text-[#64748B] hover:text-[#3B82F6] text-xs underline">View on Polygonscan ↗</a>
                    </div>
                  )}
                  <button onClick={() => { if (onFunded) onFunded({ contractAddress, txHash }); }}
                    className="px-8 py-3 rounded-xl bg-[#10B981] hover:bg-[#059669] text-white font-bold text-sm transition-all">
                    Start Building →
                  </button>
                </div>
              )}

            </div>

            {/* Contract info panel */}
            {contractAddress && step >= 2 && (
              <div className="mt-5 bg-[#1E293B] border border-[#334155] rounded-2xl px-6 py-5 animate-fadeIn">
                <h3 className="text-[#94A3B8] text-xs font-bold uppercase tracking-widest mb-4">Contract Info</h3>
                <div className="space-y-3 text-xs">
                  <div className="flex items-start gap-2">
                    <span className="text-[#475569] w-28 flex-shrink-0">Address</span>
                    <span className="text-[#3B82F6] font-mono break-all flex-1">{contractAddress}</span>
                    <CopyButton text={contractAddress} />
                  </div>
                  <div className="flex items-start gap-2">
                    <span className="text-[#475569] w-28 flex-shrink-0">Explorer</span>
                    <a href={`https://amoy.polygonscan.com/address/${contractAddress}`} target="_blank" rel="noreferrer"
                      className="text-[#3B82F6] underline hover:text-[#60A5FA]">amoy.polygonscan.com ↗</a>
                  </div>
                  <div className="h-px bg-[#334155]" />
                  <div className="space-y-1.5 text-[#64748B] leading-relaxed">
                    <p>⏱ <strong className="text-[#94A3B8]">Cancellation:</strong> Within 2 hours: full refund. After: 2–13% penalty based on milestone progress.</p>
                    <p>🔐 <strong className="text-[#94A3B8]">Recovery:</strong> 2 of 3 wallets can recover funds with 72-hour timelock.</p>
                    <p>⚖️ <strong className="text-[#94A3B8]">Force majeure:</strong> Either party can pause the project via on-chain vote.</p>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // Component: VisualSRSBuilderPage — drag-and-drop screen builder
    // ═══════════════════════════════════════════════════════════════
    function VisualSRSBuilderPage({ onRequirementsGenerated }) {
      const [canvasBlocks,    setCanvasBlocks]    = React.useState([]);
      const [selectedId,      setSelectedId]      = React.useState(null);
      const [dragOverCanvas,  setDragOverCanvas]  = React.useState(false);
      const [draggedSidebarBlock, setDraggedSidebarBlock] = React.useState(null);
      const [draggedCanvasIdx,    setDraggedCanvasIdx]    = React.useState(null);
      const [configs,         setConfigs]         = React.useState({});  // blockId → config obj

      const SIDEBAR_BLOCKS = [
        { category: 'Layout',     blocks: [
          { type: 'header',   icon: '▬', label: 'Header' },
          { type: 'footer',   icon: '▭', label: 'Footer' },
        ]},
        { category: 'Content',    blocks: [
          { type: 'hero',      icon: '🌟', label: 'Hero' },
          { type: 'cards',     icon: '🃏', label: 'Cards Grid' },
          { type: 'features',  icon: '✨', label: 'Feature List' },
          { type: 'testimonials', icon: '💬', label: 'Testimonials' },
        ]},
        { category: 'Data',       blocks: [
          { type: 'table',    icon: '📊', label: 'Table' },
          { type: 'form',     icon: '📝', label: 'Form' },
          { type: 'stats',    icon: '📈', label: 'Stats Dashboard' },
        ]},
        { category: 'Navigation', blocks: [
          { type: 'navbar',   icon: '📌', label: 'Navbar' },
          { type: 'sidebar',  icon: '◧',  label: 'Sidebar' },
          { type: 'tabs',     icon: '🗂', label: 'Tabs' },
        ]},
        { category: 'Actions',    blocks: [
          { type: 'buttons',  icon: '🔘', label: 'Button Group' },
          { type: 'cta',      icon: '📣', label: 'CTA' },
          { type: 'search',   icon: '🔍', label: 'Search Bar' },
        ]},
      ];

      // Map block type → REQUIREMENT_TEMPLATES keys
      const BLOCK_TO_REQS = {
        hero:         ['hero_section', 'landing_page'],
        cards:        ['card_grid', 'product_listing'],
        features:     ['feature_list'],
        testimonials: ['testimonial_section'],
        table:        ['data_table', 'sortable_table'],
        form:         ['contact_form', 'form_builder'],
        stats:        ['stats_dashboard', 'analytics_overview'],
        navbar:       ['nav_top', 'navbar_responsive'],
        sidebar:      ['nav_sidebar'],
        tabs:         ['tab_navigation'],
        buttons:      ['button_group', 'cta_button'],
        cta:          ['cta_section'],
        search:       ['search_bar', 'search_filter'],
        header:       ['site_header'],
        footer:       ['site_footer'],
      };

      // Config field definitions per block type
      const BLOCK_CONFIG_FIELDS = {
        hero:  [{ key: 'headline', label: 'Headline', placeholder: 'e.g. Build software faster' },
                { key: 'subtext',  label: 'Subtext',  placeholder: 'e.g. AI-powered project delivery' },
                { key: 'cta',      label: 'CTA Text', placeholder: 'e.g. Get Started' }],
        form:  [{ key: 'fields',   label: 'Fields (comma-sep)', placeholder: 'e.g. Name, Email, Message' },
                { key: 'submit',   label: 'Submit Label', placeholder: 'e.g. Send Message' }],
        cards: [{ key: 'columns',  label: 'Columns', placeholder: 'e.g. 3' },
                { key: 'cardTitle',label: 'Card Type', placeholder: 'e.g. Product card' }],
      };

      function addToCanvas(blockDef) {
        const id = blockDef.type + '_' + Date.now();
        setCanvasBlocks(prev => [...prev, { ...blockDef, id }]);
        setSelectedId(id);
      }

      // ── Sidebar drag handlers ──
      function onSidebarDragStart(e, blockDef) {
        setDraggedSidebarBlock(blockDef);
        e.dataTransfer.effectAllowed = 'copy';
      }

      // ── Canvas drag-over / drop ──
      function onCanvasDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = draggedSidebarBlock ? 'copy' : 'move';
        setDragOverCanvas(true);
      }
      function onCanvasDragLeave() { setDragOverCanvas(false); }
      function onCanvasDrop(e) {
        e.preventDefault();
        setDragOverCanvas(false);
        if (draggedSidebarBlock) {
          addToCanvas(draggedSidebarBlock);
          setDraggedSidebarBlock(null);
        }
      }

      // ── Canvas block reorder ──
      function onBlockDragStart(e, idx) {
        setDraggedCanvasIdx(idx);
        e.dataTransfer.effectAllowed = 'move';
      }
      function onBlockDragOver(e, idx) {
        e.preventDefault();
        if (draggedCanvasIdx === null || draggedCanvasIdx === idx) return;
        const updated = [...canvasBlocks];
        const [moved] = updated.splice(draggedCanvasIdx, 1);
        updated.splice(idx, 0, moved);
        setCanvasBlocks(updated);
        setDraggedCanvasIdx(idx);
      }
      function onBlockDragEnd() { setDraggedCanvasIdx(null); }

      function removeBlock(id) {
        setCanvasBlocks(prev => prev.filter(b => b.id !== id));
        if (selectedId === id) setSelectedId(null);
      }

      function updateConfig(blockId, key, value) {
        setConfigs(prev => ({ ...prev, [blockId]: { ...(prev[blockId] || {}), [key]: value } }));
      }

      // ── Convert to requirements ──
      function handleConvert() {
        const requirements = [];
        canvasBlocks.forEach(block => {
          const reqKeys = BLOCK_TO_REQS[block.type] || [block.type];
          reqKeys.forEach(reqKey => {
            const template = (typeof REQUIREMENT_TEMPLATES !== 'undefined' && REQUIREMENT_TEMPLATES[reqKey]) || null;
            requirements.push({
              id:                reqKey + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,5),
              plain_description: template?.plain_description || (block.label + ' component'),
              category:          template?.category || 'ui_component',
              complexity:        template?.default_complexity || 'medium',
              vaultStatus:       'hit',
              cost:              template ? 3000 : 4000,
              fromVisualBuilder: true,
              blockType:         block.type,
            });
          });
        });
        if (onRequirementsGenerated) onRequirementsGenerated(requirements);
      }

      // ── Upload screenshot placeholder ──
      function handleUpload(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        alert(`Screenshot "${file.name}" uploaded. In production, this would be sent to the AI vision API to extract screen structure automatically.`);
      }

      const selectedBlock = canvasBlocks.find(b => b.id === selectedId);
      const configFields  = selectedBlock ? (BLOCK_CONFIG_FIELDS[selectedBlock.type] || []) : [];
      const totalReqCount = canvasBlocks.reduce((s, b) => s + (BLOCK_TO_REQS[b.type]?.length || 1), 0);

      return (
        <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC] flex flex-col">

          {/* Top bar */}
          <div className="flex items-center justify-between px-6 py-4 border-b border-[#1E293B] bg-[#0F172A]">
            <div>
              <h1 className="text-lg font-bold text-[#F8FAFC]">Visual SRS Builder</h1>
              <p className="text-[#64748B] text-xs">Drag UI blocks to build your screen layout</p>
            </div>
            <button className="px-4 py-2 rounded-lg border border-[#334155] text-[#94A3B8] hover:text-[#F8FAFC] hover:border-[#475569] text-sm transition-colors">
              ✍️ Switch to Text Negotiation
            </button>
          </div>

          {/* Main 3-col layout */}
          <div className="flex flex-1 overflow-hidden">

            {/* LEFT SIDEBAR — 20% */}
            <div className="w-56 flex-shrink-0 border-r border-[#1E293B] overflow-y-auto bg-[#0A0F1A] px-3 py-4 space-y-4">
              {SIDEBAR_BLOCKS.map(group => (
                <div key={group.category}>
                  <p className="text-[#475569] text-[10px] font-bold uppercase tracking-widest mb-2 px-1">{group.category}</p>
                  <div className="space-y-1">
                    {group.blocks.map(block => (
                      <div key={block.type}
                        draggable
                        onDragStart={e => onSidebarDragStart(e, block)}
                        onDoubleClick={() => addToCanvas(block)}
                        title="Drag to canvas or double-click to add"
                        className="flex items-center gap-2.5 px-3 py-2.5 rounded-lg cursor-grab active:cursor-grabbing border border-transparent hover:border-[#334155] hover:bg-[#1E293B] transition-all select-none">
                        <span className="text-base leading-none">{block.icon}</span>
                        <span className="text-[#CBD5E1] text-xs font-medium">{block.label}</span>
                        <span className="ml-auto text-[#334155] text-[10px]">⠿</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            {/* CENTER CANVAS — 60% */}
            <div className="flex-1 flex flex-col overflow-hidden">
              <div
                onDragOver={onCanvasDragOver}
                onDragLeave={onCanvasDragLeave}
                onDrop={onCanvasDrop}
                className={`flex-1 overflow-y-auto p-6 transition-all ${dragOverCanvas ? 'bg-[#3B82F6]/5 border-2 border-dashed border-[#3B82F6]/40' : ''}`}>

                {canvasBlocks.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-center animate-fadeIn">
                    <div className="w-20 h-20 rounded-2xl border-2 border-dashed border-[#334155] flex items-center justify-center mb-4">
                      <span className="text-3xl">🎨</span>
                    </div>
                    <p className="text-[#475569] font-medium text-base">Drag blocks here</p>
                    <p className="text-[#334155] text-xs mt-1">or double-click any block in the sidebar</p>
                  </div>
                ) : (
                  <div className="space-y-3 max-w-2xl mx-auto">
                    {canvasBlocks.map((block, idx) => {
                      const isSelected = selectedId === block.id;
                      return (
                        <div key={block.id}
                          draggable
                          onDragStart={e => onBlockDragStart(e, idx)}
                          onDragOver={e => onBlockDragOver(e, idx)}
                          onDragEnd={onBlockDragEnd}
                          onClick={() => setSelectedId(block.id)}
                          className={`relative flex items-center gap-3 px-4 py-3.5 rounded-xl border-2 cursor-pointer transition-all select-none
                            ${isSelected ? 'border-[#3B82F6] bg-[#3B82F6]/8' : 'border-[#334155] bg-[#1E293B] hover:border-[#475569]'}`}>
                          <span className="text-[#475569] text-sm cursor-grab">⠿⠿</span>
                          <span className="text-xl leading-none">{block.icon}</span>
                          <div className="flex-1 min-w-0">
                            <p className="text-[#F8FAFC] text-sm font-semibold">{block.label}</p>
                            {configs[block.id]?.headline && (
                              <p className="text-[#64748B] text-xs truncate">{configs[block.id].headline}</p>
                            )}
                          </div>
                          {isSelected && (
                            <span className="text-[#3B82F6] text-[10px] font-bold uppercase tracking-wide">Selected</span>
                          )}
                          <button onClick={e => { e.stopPropagation(); removeBlock(block.id); }}
                            className="w-6 h-6 rounded flex items-center justify-center text-[#475569] hover:text-[#EF4444] hover:bg-[#EF4444]/10 transition-colors flex-shrink-0">
                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* Bottom bar */}
              <div className="border-t border-[#1E293B] px-6 py-4 bg-[#0A0F1A] flex items-center justify-between gap-4">
                <div className="flex items-center gap-4">
                  <span className="text-[#64748B] text-xs">
                    <strong className="text-[#F8FAFC]">{canvasBlocks.length}</strong> block{canvasBlocks.length !== 1 ? 's' : ''}
                    {' → '}
                    <strong className="text-[#3B82F6]">{totalReqCount}</strong> requirement{totalReqCount !== 1 ? 's' : ''}
                  </span>
                  <label className="cursor-pointer px-3 py-2 rounded-lg border border-[#334155] text-[#64748B] hover:text-[#F8FAFC] hover:border-[#475569] text-xs transition-colors">
                    📷 Upload Screenshot
                    <input type="file" accept="image/*" className="hidden" onChange={handleUpload} />
                  </label>
                </div>
                <button onClick={handleConvert} disabled={canvasBlocks.length === 0}
                  className="px-6 py-2.5 rounded-xl bg-[#3B82F6] hover:bg-[#2563EB] text-white font-bold text-sm transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                  Convert to Requirements →
                </button>
              </div>
            </div>

            {/* RIGHT CONFIG PANEL — 20% */}
            <div className="w-56 flex-shrink-0 border-l border-[#1E293B] overflow-y-auto bg-[#0A0F1A] px-4 py-4">
              {selectedBlock ? (
                <div className="animate-fadeIn">
                  <div className="flex items-center gap-2 mb-4">
                    <span className="text-xl">{selectedBlock.icon}</span>
                    <h3 className="text-[#F8FAFC] font-bold text-sm">{selectedBlock.label}</h3>
                  </div>
                  {configFields.length > 0 ? (
                    <div className="space-y-4">
                      {configFields.map(field => (
                        <div key={field.key}>
                          <label className="block text-[#64748B] text-[10px] font-semibold uppercase tracking-wide mb-1.5">{field.label}</label>
                          <input
                            value={(configs[selectedId] || {})[field.key] || ''}
                            onChange={e => updateConfig(selectedId, field.key, e.target.value)}
                            placeholder={field.placeholder}
                            className="w-full bg-[#0F172A] border border-[#334155] focus:border-[#3B82F6] rounded-lg px-3 py-2.5 text-[#F8FAFC] text-xs placeholder-[#334155] focus:outline-none transition-colors"/>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <p className="text-[#475569] text-xs">No configurable fields for this block.</p>
                  )}
                  <div className="mt-5 pt-4 border-t border-[#1E293B]">
                    <p className="text-[#475569] text-[10px] font-semibold uppercase tracking-wide mb-1.5">Maps to</p>
                    {(BLOCK_TO_REQS[selectedBlock.type] || [selectedBlock.type]).map(k => (
                      <span key={k} className="inline-block text-[10px] bg-[#3B82F6]/10 text-[#3B82F6] border border-[#3B82F6]/20 rounded px-1.5 py-0.5 mr-1 mb-1">{k}</span>
                    ))}
                  </div>

    // ═══════════════════════════════════════════════════════════════
    // STATSBAR — real-time counter bar above build dashboard
    // ═══════════════════════════════════════════════════════════════
    function StatsBar({ stats }) {
      const [elapsed, setElapsed] = React.useState('0:00');

      React.useEffect(() => {
        if (!stats.startTime) return;
        const iv = setInterval(() => {
          const secs = Math.floor((Date.now() - stats.startTime) / 1000);
          const m = Math.floor(secs / 60);
          const s = secs % 60;
          setElapsed(`${m}:${s.toString().padStart(2, '0')}`);
        }, 1000);
        return () => clearInterval(iv);
      }, [stats.startTime]);

      const counters = [
        { label: 'FILES GENERATED', value: stats.files || 0 },
        { label: 'LINES OF CODE',   value: (stats.lines || 0).toLocaleString() },
        { label: 'TESTS PASSED',    value: `${stats.testsPassed || 0}/${stats.testsTotal || 0}` },
        { label: 'VAULT EFFICIENCY',value: `${stats.vaultPercent || 0}%` },
        { label: 'TOKENS USED',     value: (stats.tokens || 0).toLocaleString() },
        { label: 'TIME ELAPSED',    value: elapsed },
      ];

      return (
        <div className="bg-[#1E293B] border-b border-[#334155] px-6 py-3 flex items-center justify-around">
          {counters.map((c, i) => (
            <div key={i} className="text-center">
              <div className="text-3xl font-bold text-[#F8FAFC] transition-all duration-500">{c.value}</div>
              <div className="text-xs text-[#94A3B8] mt-0.5 tracking-wide">{c.label}</div>
            </div>
          ))}
        </div>
      );
    }

    // BUILDPAGE — THE BUILD THEATRE
    // ═══════════════════════════════════════════════════════════════
    function BuildPage({ projectId, onDelivery }) {
      const [stats, setStats] = React.useState({

        vaultPercent: 0, tokens: 0, startTime: Date.now()
      });
      const [currentTask, setCurrentTask]   = React.useState(null);

        type = type || 'blue';

      React.useEffect(() => {

        addEvent('Build started — Milestone 1: Auth & Dashboard', 'blue');
        setCurrentTask(MOCK_TASKS[0]);
        setVaultStatus('Retrieving from Vault...');

        const iv = setInterval(() => {

            {/* PANEL 2 — Generated Files */}

              <h3 className="text-[#94A3B8] text-xs font-semibold uppercase tracking-wide mb-3">

                          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold border-2 transition-all

                    Preview will appear after<br />Milestone 1 completes

            </div>

          </div>

          {/* Event Log */}
          <div className="px-6 pb-6">
            <div className="bg-[#1E293B] rounded-xl border border-[#334155] p-4">
              <h3 className="text-[#94A3B8] text-xs font-semibold uppercase tracking-wide mb-3">📋 Event Log</h3>
              <div ref={logRef} className="max-h-48 overflow-y-auto space-y-1 font-mono text-xs">

                  const colors = { blue: 'text-[#3B82F6]', green: 'text-[#10B981]', red: 'text-[#EF4444]', purple: 'text-[#A78BFA]', amber: 'text-[#F59E0B]' };

                {eventLog.length === 0 && (
                  <p className="text-[#475569]">Build starting…</p>
                )}
              </div>
            </div>
          </div>

        </div>
      );
    }

    function DeliveryPage({ projectId, project, onNavigate }) {
      const [confettiPieces] = React.useState(function() {
        return Array.from({ length: 60 }, function(_, i) {
          return {
            id: i,
            left:     Math.random() * 100,
            delay:    Math.random() * 1.5,
            duration: 2.5 + Math.random() * 2,
            color:    ['#3B82F6','#10B981','#F59E0B','#A78BFA','#F472B6'][Math.floor(Math.random() * 5)],
          };
        });
      });
      const [showConfetti, setShowConfetti] = React.useState(true);
      const [copied, setCopied] = React.useState(false);

      React.useEffect(() => {
        const t = setTimeout(function() { setShowConfetti(false); }, 3000);

    function DisputePage({ projectId, milestones }) {
      const demoMilestones = (milestones && milestones.length > 0) ? milestones : [
        { id: 1, name: 'Auth & Dashboard', requirements: ['DEMO_001','DEMO_002','DEMO_003','DEMO_004'] },
        { id: 2, name: 'Task Management',  requirements: ['DEMO_005','DEMO_006','DEMO_007','DEMO_008'] },
      ];
      const reqLabels = {
        DEMO_001: 'User can sign in with Google',
        DEMO_002: 'Dashboard with task counts',
        DEMO_003: 'Create task form',
        DEMO_004: 'Task list with status filter',
        DEMO_005: 'Mark task complete',
        DEMO_006: 'Drag-drop priority reordering',
        DEMO_007: 'Email notification on due date',
        DEMO_008: 'Export tasks to CSV',
      };
      const criteria = {
        DEMO_001: 'GIVEN a user on login WHEN they click Sign In THEN auth completes',
        DEMO_002: 'GIVEN a signed-in user WHEN on dashboard THEN task counts show by status',
        DEMO_003: 'GIVEN a user WHEN submitting form THEN task is saved to database',
        DEMO_004: 'GIVEN tasks exist WHEN user selects status THEN list filters correctly',
        DEMO_005: 'GIVEN a task WHEN checkbox clicked THEN status toggles to complete',
        DEMO_006: 'GIVEN task list WHEN user drags THEN order persists on reload',
        DEMO_007: 'GIVEN a due date WHEN date passes THEN email is sent automatically',
        DEMO_008: 'GIVEN tasks WHEN export clicked THEN CSV downloads with all columns',
      };

      const [selMilestone, setSelMilestone] = React.useState('');
      const [selReq,       setSelReq]       = React.useState('');
      const [issueText,    setIssueText]    = React.useState('');
      const [submitted,    setSubmitted]    = React.useState(false);
      const [disputes,     setDisputes]     = React.useState([]);
      const [disputeCount, setDisputeCount] = React.useState({});

      const milestoneReqs = selMilestone
        ? ((demoMilestones.find(function(m) { return String(m.id) === selMilestone; }) || {}).requirements || [])
        : [];

      function submitDispute() {
        if (!selMilestone || !selReq || !issueText.trim()) return;
        const key = `${selMilestone}-${selReq}`;
        const count = (disputeCount[key] || 0) + 1;
        setDisputeCount(function(prev) { return { ...prev, [key]: count }; });
        const ms = demoMilestones.find(function(m) { return String(m.id) === selMilestone; });
        setDisputes(function(prev) {
          return [...prev, {
            milestone: ms ? ms.name : selMilestone,
            req: reqLabels[selReq] || selReq,
            issue: issueText,
            ts: new Date().toLocaleString('en-IN'),
            count: count,
          }];
        });
        setIssueText('');
        setSubmitted(true);
        setTimeout(function() { setSubmitted(false); }, 3000);
      }

      const feeWarning = selMilestone && selReq &&
        (disputeCount[`${selMilestone}-${selReq}`] || 0) >= 2;

      return (
        <div className="min-h-screen bg-[#0F172A] px-6 py-12 max-w-3xl mx-auto">
          <h1 className="text-3xl font-bold text-[#F8FAFC] mb-2">⚠️ Raise a Dispute</h1>
          <p className="text-[#64748B] mb-8">If a deliverable doesn't meet its acceptance criterion, raise a dispute here.</p>

          <div className="bg-[#1E293B] rounded-2xl border border-[#334155] p-6 mb-6 animate-slideUp space-y-5">
            <div>
              <label className="block text-[#94A3B8] text-xs font-semibold uppercase tracking-wide mb-2">Select Milestone</label>
              <select value={selMilestone} onChange={function(e) { setSelMilestone(e.target.value); setSelReq(''); }}

                {demoMilestones.map(function(m) {
                  return <option key={m.id} value={String(m.id)}>{m.name}</option>;
                })}
              </select>
            </div>

            <div>
              <label className="block text-[#94A3B8] text-xs font-semibold uppercase tracking-wide mb-2">Select Requirement</label>
              <select value={selReq} onChange={function(e) { setSelReq(e.target.value); }} disabled={!selMilestone}
                className="w-full bg-[#0F172A] border border-[#334155] focus:border-[#3B82F6] rounded-xl px-4 py-3 text-[#F8FAFC] text-sm focus:outline-none disabled:opacity-40">
                <option value="">— Choose requirement —</option>
                {milestoneReqs.map(function(r) {
                  return <option key={r} value={r}>{reqLabels[r] || r}</option>;
                })}
              </select>
            </div>

            {selReq && criteria[selReq] && (
              <div className="bg-[#0F172A] rounded-xl px-4 py-3 text-xs font-mono text-[#10B981] animate-fadeIn">
                <span className="text-[#64748B] block mb-1">Acceptance Criterion:</span>
                {criteria[selReq]}
              </div>
            )}

            <div>
              <label className="block text-[#94A3B8] text-xs font-semibold uppercase tracking-wide mb-2">How does the code fail?</label>
              <textarea value={issueText} onChange={function(e) { setIssueText(e.target.value); }}
                placeholder="Describe exactly how the delivered code fails to meet the criterion above…"
                rows={4}
                className="w-full bg-[#0F172A] border border-[#334155] focus:border-[#3B82F6] rounded-xl px-4 py-3 text-[#F8FAFC] text-sm placeholder-[#475569] focus:outline-none transition-colors resize-none" />
            </div>

            {feeWarning && (
              <div className="bg-[#7F1D1D]/30 border border-[#EF4444]/40 rounded-xl px-4 py-3 text-[#FCA5A5] text-xs">
                ⚠️ <strong>Fee warning:</strong> This is your 3rd dispute on this milestone/requirement. A ₹500 arbitration fee applies.
              </div>
            )}

            {submitted && (
              <div className="text-[#10B981] text-sm font-semibold animate-fadeIn">✅ Dispute submitted for review.</div>
            )}

            <button onClick={submitDispute}
              disabled={!selMilestone || !selReq || !issueText.trim()}
              className="w-full py-3 rounded-xl bg-[#EF4444] hover:bg-[#DC2626] text-white font-bold transition-all disabled:opacity-40">
              Submit Dispute
            </button>
          </div>

          {disputes.length > 0 && (
            <div className="bg-[#1E293B] rounded-2xl border border-[#334155] p-6 animate-slideUp">
              <h2 className="text-[#F8FAFC] font-bold mb-4">Dispute History</h2>
              <div className="space-y-3">
                {disputes.map(function(d, i) {
                  return (
                    <div key={i} className="bg-[#0F172A] rounded-xl px-4 py-3">
                      <div className="flex justify-between text-xs mb-1">
                        <span className="text-[#3B82F6] font-semibold">{d.milestone}</span>
                        <span className="text-[#475569]">{d.ts}</span>
                      </div>
                      <p className="text-[#F8FAFC] text-xs font-medium mb-1">{d.req}</p>
                      <p className="text-[#94A3B8] text-xs">{d.issue}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // DEMOTIMER — stage demo timer (fixed top-right)
    // ═══════════════════════════════════════════════════════════════
    function DemoTimer({ isActive }) {
      const [startTime]             = React.useState(Date.now());
      const [elapsed, setElapsed]   = React.useState(0);
      const [collapsed, setCollapsed] = React.useState(false);

      React.useEffect(() => {
        if (!isActive) return;
        const iv = setInterval(function() { setElapsed(Math.floor((Date.now() - startTime) / 1000)); }, 1000);
        return function() { clearInterval(iv); };
      }, [isActive, startTime]);

      if (!isActive) return null;

      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      const color = elapsed < 420 ? '#10B981' : elapsed < 540 ? '#F59E0B' : '#EF4444';
      const cues = [
        { t: 0,   label: 'Introduce BuildPact' },
        { t: 60,  label: 'Start negotiation' },
        { t: 180, label: 'SRS compiling' },
        { t: 300, label: 'Generation starting' },
        { t: 420, label: 'Tests running' },
        { t: 540, label: 'Delivery — show app' },
      ];
      const activeCue = [...cues].reverse().find(function(c) { return elapsed >= c.t; }) || cues[0];

      return (
        <div className="fixed top-20 right-4 z-50 bg-[#1E293B] border border-[#334155] rounded-xl shadow-xl overflow-hidden"
          style={{ minWidth: 160 }}>
          <div className="flex items-center justify-between px-3 py-2 border-b border-[#334155]">
            <span className="text-[10px] text-[#64748B] font-semibold uppercase tracking-wide">Demo Timer</span>
            <button onClick={function() { setCollapsed(function(c) { return !c; }); }}
              className="text-[#475569] hover:text-[#F8FAFC] text-xs">
              {collapsed ? '▼' : '▲'}
            </button>
          </div>
          <div className="px-4 py-2 text-center">
            <span className="font-mono text-2xl font-bold transition-colors duration-300" style={{ color: color }}>
              {mins}:{secs.toString().padStart(2, '0')}
            </span>
          </div>
          {!collapsed && (
            <div className="px-3 pb-3 animate-fadeIn">
              <div className="text-[10px] text-[#F59E0B] font-semibold mb-2">▶ {activeCue.label}</div>
              <div className="space-y-1">
                {cues.map(function(c) {
                  const cm = Math.floor(c.t / 60);
                  const cs = c.t % 60;
                  const isActiveCue = activeCue.t === c.t;
                  return (
                    <div key={c.t} className={`flex gap-2 text-[10px] ${isActiveCue ? 'text-[#F8FAFC] font-semibold' : 'text-[#475569]'}`}>
                      <span className="w-8 flex-shrink-0 font-mono">{cm}:{cs.toString().padStart(2,'0')}</span>
                      <span>{c.label}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    function App() {
      const [firebaseReady,        setFirebaseReady]        = React.useState(window.firebaseReady === true);
      const [user,                 setUser]                 = React.useState(null);
      const [userProfile,          setUserProfile]          = React.useState(null);
      const [project,              setProject]              = React.useState(null);
      const [currentPage,          setCurrentPage]          = React.useState('landing');
      const [showAccountTypeModal, setShowAccountTypeModal] = React.useState(false);
      const [appError,             setAppError]             = React.useState('');
      const [srsJson,              setSrsJson]              = React.useState(null);
      const [pricingBreakdown,     setPricingBreakdown]     = React.useState(null);
      const [demoMode,             setDemoMode]             = React.useState(false);
      const [challengeMode,        setChallengeMode]        = React.useState(false);
      const [demoTimerActive,      setDemoTimerActive]      = React.useState(false);

      React.useEffect(() => {
        if (window.firebaseReady) return;
        const handler = function() { setFirebaseReady(true); };
        window.addEventListener('firebase-ready', handler);
        return function() { window.removeEventListener('firebase-ready', handler); };
      }, []);

      React.useEffect(() => {
        if (!firebaseReady || !window.firebaseFns || !window.firebaseAuth) return;
        const { onAuthStateChanged, doc, getDoc } = window.firebaseFns;
        const unsub = onAuthStateChanged(window.firebaseAuth, async function(firebaseUser) {
          if (!firebaseUser) {
            setUser(null); setUserProfile(null); setProject(null); setCurrentPage('landing');
            return;
          }
          setUser(firebaseUser);
          try {
            const userSnap = await getDoc(doc(window.firebaseDb, 'users', firebaseUser.uid));
            if (userSnap.exists()) {
              const profile = userSnap.data();
              setUserProfile(profile);
              setCurrentPage(profile.activeProjectId ? 'negotiation' : 'prequal');
            } else {
              setShowAccountTypeModal(true);
            }
          } catch (err) {
            console.error('[App] Error loading user profile:', err);
            setAppError('Failed to load your profile. Please refresh.');
          }
        });
        return function() { unsub(); };
      }, [firebaseReady]);

      function navigateTo(page) {
        setCurrentPage(page);
        window.scrollTo(0, 0);
      }

      async function handleSignIn() {
        setAppError('');
        const { signInWithPopup } = window.firebaseFns;
        await signInWithPopup(window.firebaseAuth, window.googleProvider);
      }

      async function handleSignOut() {
        setAppError('');
        try {
          const { signOut } = window.firebaseFns;
          await signOut(window.firebaseAuth);
          setProject(null); setCurrentPage('landing');
          setUserProfile(null); setShowAccountTypeModal(false);
          setDemoMode(false); setChallengeMode(false); setDemoTimerActive(false);
        } catch (err) {
          console.error('[App] Sign-out error:', err);
        }
      }

      async function handleAccountTypeSelect(typeData) {
        setAppError('');
        const { doc, setDoc, serverTimestamp } = window.firebaseFns;
        const profileData = {
          email: user.email, displayName: user.displayName, photoURL: user.photoURL,
          ...typeData, createdAt: serverTimestamp(), projectIds: [],
        };
        await setDoc(doc(window.firebaseDb, 'users', user.uid), profileData);
        setUserProfile(profileData);
        setShowAccountTypeModal(false);
        setCurrentPage('prequal');
      }

      async function handlePreQualComplete(answers) {
        setAppError('');
        try {
          const { collection, addDoc, doc, updateDoc, arrayUnion, serverTimestamp } = window.firebaseFns;
          const newProjectRef = await addDoc(collection(window.firebaseDb, 'projects'), {
            clientId: user.uid, clientEmail: user.email,
            preQualAnswers: answers, status: 'negotiating',
            createdAt: serverTimestamp(), updatedAt: serverTimestamp(),
          });
          await updateDoc(doc(window.firebaseDb, 'users', user.uid), {
            activeProjectId: newProjectRef.id,
            projectIds: arrayUnion(newProjectRef.id),
          });
          setProject({ id: newProjectRef.id, status: 'negotiating', preQualAnswers: answers });
          navigateTo('negotiation');
        } catch (err) {
          console.error('[App] Failed to create project:', err);
          setAppError('Failed to save your answers. Please try again.');
        }
      }

      function handleDemoMode() {
        const DEMO_SRS = {
          projectName: 'TaskFlow',
          projectType: 'saas',
          requirements: [
            { requirement_id: 'DEMO_001', plain_description: 'User can sign in with Google', technical_spec: 'Firebase Auth Google provider', acceptance_criterion: 'GIVEN a user on login WHEN they click Sign In THEN auth completes', complexity: 'low', estimated_hours: 2, milestone_number: 1, category: 'auth', vault_status: 'vault_hit' },
            { requirement_id: 'DEMO_002', plain_description: 'Dashboard with task counts by status', technical_spec: 'React dashboard with Firestore aggregation', acceptance_criterion: 'GIVEN signed-in user WHEN on dashboard THEN task counts show by status', complexity: 'low', estimated_hours: 3, milestone_number: 1, category: 'ui', vault_status: 'vault_hit' },
            { requirement_id: 'DEMO_003', plain_description: 'Create task form', technical_spec: 'Form with validation saving to Firestore', acceptance_criterion: 'GIVEN user WHEN submitting form THEN task is saved', complexity: 'low', estimated_hours: 3, milestone_number: 1, category: 'crud', vault_status: 'vault_hit' },
            { requirement_id: 'DEMO_004', plain_description: 'Task list with status filter', technical_spec: 'Filterable task list from Firestore query', acceptance_criterion: 'GIVEN tasks WHEN filter selected THEN list updates', complexity: 'low', estimated_hours: 3, milestone_number: 1, category: 'crud', vault_status: 'vault_hit' },
            { requirement_id: 'DEMO_005', plain_description: 'Mark task complete', technical_spec: 'Checkbox toggle updating Firestore status field', acceptance_criterion: 'GIVEN task WHEN checkbox clicked THEN status toggles', complexity: 'low', estimated_hours: 2, milestone_number: 2, category: 'crud', vault_status: 'vault_hit' },
            { requirement_id: 'DEMO_006', plain_description: 'Drag-drop priority reordering', technical_spec: 'react-beautiful-dnd with Firestore order field', acceptance_criterion: 'GIVEN task list WHEN user drags THEN order persists', complexity: 'medium', estimated_hours: 5, milestone_number: 2, category: 'ux', vault_status: 'new' },
            { requirement_id: 'DEMO_007', plain_description: 'Email notification on due date', technical_spec: 'Cloud Function triggered by Firestore scheduled check', acceptance_criterion: 'GIVEN due date WHEN date passes THEN email sent', complexity: 'medium', estimated_hours: 5, milestone_number: 2, category: 'notification', vault_status: 'vault_hit' },
            { requirement_id: 'DEMO_008', plain_description: 'Export tasks to CSV', technical_spec: 'Client-side CSV generation with papaparse', acceptance_criterion: 'GIVEN tasks WHEN export clicked THEN CSV downloads', complexity: 'low', estimated_hours: 3, milestone_number: 2, category: 'data', vault_status: 'vault_hit' },
          ],
          milestones: [
            { id: 1, name: 'Auth & Dashboard', requirements: ['DEMO_001','DEMO_002','DEMO_003','DEMO_004'] },
            { id: 2, name: 'Task Management',  requirements: ['DEMO_005','DEMO_006','DEMO_007','DEMO_008'] },
          ],
        };
        setSrsJson(DEMO_SRS);
        setDemoMode(true);
        setDemoTimerActive(true);
        setProject({
          id: 'demo-project', status: 'funded', isDemo: true,
          projectType: 'saas', milestones: DEMO_SRS.milestones,
          preQualAnswers: { description: 'TaskFlow — Task Management SaaS' },
        });
        navigateTo('contract');
      }

      function handleChallengeMode() {
        setChallengeMode(true);
        setDemoTimerActive(true);
        setProject({ id: 'challenge-' + Date.now(), status: 'negotiating', isChallengeMode: true });
        navigateTo('negotiation');
      }

      if (!firebaseReady) {
        return (
          <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC] flex items-center justify-center">
            <div className="text-center animate-fadeIn">
              <h1 className="text-4xl font-bold text-[#3B82F6] animate-pulse-slow mb-4 tracking-tight">BuildPact</h1>
              <p className="text-[#64748B] text-sm">
                <svg className="animate-spin h-4 w-4 inline mr-2" fill="none" viewBox="0 0 24 24">
                  <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                  <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                </svg>
                Connecting to Firebase…
              </p>
            </div>
          </div>
        );
      }

      function PlaceholderPage({ name }) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center animate-fadeIn">
              <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#1E293B] border border-[#334155] text-[#94A3B8] text-xs font-medium mb-6">
                <span className="w-1.5 h-1.5 rounded-full bg-[#3B82F6] animate-pulse-slow inline-block" />
                {demoMode ? 'Demo Mode' : challengeMode ? 'Challenge Mode' : 'Live Build'}
              </div>
              <h2 className="text-2xl font-bold text-[#F8FAFC] mb-3">
                Page: <span className="text-[#3B82F6] font-mono">{name}</span>
              </h2>
              <p className="text-[#64748B] text-sm">This view is coming in the next build step.</p>
              {project && (
                <div className="mt-6 bg-[#1E293B] border border-[#334155] rounded-xl p-4 text-left max-w-xs mx-auto">
                  <p className="text-[#64748B] text-xs font-semibold uppercase mb-2">Active Project</p>
                  <p className="text-[#F8FAFC] text-xs font-mono break-all">{project.id}</p>
                  <p className="text-[#3B82F6] text-xs mt-1">Status: {project.status}</p>
                </div>
              )}
              <div className="flex gap-3 justify-center mt-6">
                <button onClick={function() { navigateTo('build'); }}
                  className="px-4 py-2 rounded-lg bg-[#3B82F6] text-white text-sm font-semibold hover:bg-[#2563EB] transition-colors">
                  → Go to Build Theatre
                </button>
                <button onClick={function() { navigateTo('delivery'); }}
                  className="px-4 py-2 rounded-lg border border-[#334155] text-[#94A3B8] text-sm hover:text-[#F8FAFC] hover:border-[#475569] transition-colors">
                  → Delivery Page
                </button>
              </div>
            </div>
          </div>
        );
      }

      function renderPage() {
        switch (currentPage) {
          case 'landing':
            return <LandingPage onSignIn={handleSignIn} onDemoMode={handleDemoMode} onChallengeMode={handleChallengeMode} />;
          case 'prequal':
            return <PreQualPage onComplete={handlePreQualComplete} />;
          case 'market_analysis':
            return (typeof MarketAnalysisPanel !== 'undefined')
              ? <MarketAnalysisPanel projectType={project && project.projectType} onContinue={function() { navigateTo('negotiation'); }} onSkip={function() { navigateTo('negotiation'); }} />
              : <PlaceholderPage name="market_analysis" />;
          case 'negotiation':
            return (typeof NegotiationPage !== 'undefined')
              ? <NegotiationPage projectId={project && project.id} projectType={(project && project.projectType) || 'saas'} challengeMode={challengeMode}
                  onComplete={function(srs) { setSrsJson(srs); navigateTo('srs_review'); }} />
              : <PlaceholderPage name="negotiation" />;
          case 'contradictions':
            return (typeof ContradictionReviewPage !== 'undefined')
              ? <ContradictionReviewPage contradictions={(project && project.contradictions) || []} onResolveAll={function() { navigateTo('srs_review'); }} />
              : <PlaceholderPage name="contradictions" />;
          case 'srs_review':
            return (typeof SRSReviewPage !== 'undefined')
              ? <SRSReviewPage projectId={project && project.id} srsJson={srsJson} onConfirm={function() { navigateTo('pricing'); }} />
              : <PlaceholderPage name="srs_review" />;
          case 'visual_srs':
            return (typeof VisualSRSBuilderPage !== 'undefined')
              ? <VisualSRSBuilderPage onRequirementsGenerated={function() { navigateTo('negotiation'); }} />
              : <PlaceholderPage name="visual_srs" />;
          case 'pricing':
            return (typeof PricingPage !== 'undefined')
              ? <PricingPage projectId={project && project.id} srsJson={srsJson} vaultLookups={(project && project.vaultLookups) || {}}
                  onConfirm={function(p) { setPricingBreakdown(p); navigateTo('contract'); }} />
              : <PlaceholderPage name="pricing" />;
          case 'contract':
            return (typeof ContractPage !== 'undefined')
              ? <ContractPage projectId={project && project.id} pricingBreakdown={pricingBreakdown} onFunded={function() { navigateTo('build'); }} />
              : <PlaceholderPage name="contract" />;
          case 'build':
            return <BuildPage projectId={project && project.id} onDelivery={function() { navigateTo('delivery'); }} />;
          case 'delivery':
            return <DeliveryPage projectId={project && project.id} project={project} onNavigate={navigateTo} />;
          case 'maintenance':
            return <MaintenancePage projectId={project && project.id} />;
          case 'dispute':
            return <DisputePage projectId={project && project.id} milestones={(project && project.milestones) || []} />;
          default:
            return <LandingPage onSignIn={handleSignIn} onDemoMode={handleDemoMode} onChallengeMode={handleChallengeMode} />;
        }
      }

      return (
        <div className="min-h-screen bg-[#0F172A] text-[#F8FAFC]">

          {showAccountTypeModal && (
            <AccountTypeModal onSelect={handleAccountTypeSelect} />
          )}

          {currentPage !== 'landing' && (
            <Navbar
              user={user}
              project={project}
              currentPage={currentPage}
              onSignOut={handleSignOut}
              onNavigate={navigateTo}
            />
          )}

          {appError && (
            <div className="fixed top-16 left-0 right-0 z-40 bg-[#7F1D1D] border-b border-[#EF4444] px-6 py-3 flex items-center justify-between">
              <p className="text-[#FCA5A5] text-sm">{appError}</p>
              <button onClick={function() { setAppError(''); }} className="text-[#FCA5A5] hover:text-white text-lg">×</button>
            </div>
          )}

          {(demoMode || challengeMode) && <DemoTimer isActive={demoTimerActive} />}

          <main className={`min-h-screen bg-[#0F172A] text-[#F8FAFC] ${currentPage !== 'landing' ? 'pt-16' : ''}`}>
            {renderPage()}
          </main>

        </div>
      );
    }


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);


  </script>

</body>
</html>
